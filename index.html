t": "It is for the coach who wants to help without lowering standards, embarrassing the player, or making the whole issue feel bigger than it needs to be."}, {"t": "p", "text": "This is not a medical textbook. It is not a pity book. And it is not just a book about kit clashes on television."}, {"t": "p", "text": "It is a football-specific guide to a hidden problem that can affect confidence, development, decision-making, and enjoyment of the game."}, {"t": "p", "text": "The aim of this book is simple: to help people spot colour blindness earlier, understand it more clearly, and make practical changes that help players feel more confident and play with more freedom."}, {"t": "h1", "text": "How to Use This Book", "id": "how-to-use-this-book"}, {"t": "p", "text": "This book is designed to be useful, not just informative."}, {"t": "p", "text": "You do not have to read it in a perfectly straight line from beginning to end. If you are a player, you may want to begin with the chapters on the on-pitch struggle, confidence, hesitation, and in-game solutions. If you are a parent, you may want to begin with the chapters on early signs, testing, support, and how to speak to coaches. If you are a coach, you may want to begin with the chapters on practical adaptations, communication, training design, and match-day clarity."}, {"t": "p", "text": "The book follows a simple rhythm throughout: story, explanation, practical help, and recap."}, {"t": "p", "text": "Each section is meant to help the reader feel seen, understand what is happening more clearly, and know what to do next."}, {"t": "p", "text": "Some chapters will speak more directly to one audience than another, but the goal of the book is to keep players, parents, and coaches connected to the same problem and the same solution: stop blaming the player and start making the environment clearer."}, {"t": "p", "text": "This book is not only meant to be read. It is meant to be used."}, {"t": "h1", "text": "If You Remember Nothing Else", "id": "if-you-remember-nothing-else"}, {"t": "p", "text": "If colour blindness is not tested for, it can be missed for years."}, {"t": "p", "text": "Most colour-blind players do not see only in black and white."}, {"t": "p", "text": "In football, colour is not decoration. It is information."}, {"t": "p", "text": "A player can be blamed for hesitation, inconsistency, or poor decisions when the real problem is visual confusion under pressure."}, {"t": "p", "text": "The goal is not to lower standards. The goal is to make the environment clearer."}, {"t": "p", "text": "Good communication, better contrast, and smarter training choices can help the whole team, not just one player."}, {"t": "p", "text": "Earlier awareness can protect confidence, enjoyment, and development."}, {"t": "p", "text": "Do not rely on colour alone when something important depends on being seen quickly."}, {"t": "p", "text": "Stop blaming the player. Start fixing the environment."}, {"t": "h1", "text": "Chapter 1 - Why This Book Matters", "id": "chapter-1-why-this-book-matters"}, {"t": "p", "text": "Sometimes the problem is not the player. It is the information the player is missing."}, {"t": "p", "text": "The ball came into him quickly, skidding across the wet grass."}, {"t": "p", "text": "He took his first touch and lifted his head."}, {"t": "p", "text": "Two shirts moved across his eyeline at almost the same moment. One peeled away into space. Another checked short. Studs scraped. Voices came from different angles. The game sped up around him. The space seemed to tighten. The decision was supposed to be simple."}, {"t": "p", "text": "Pass."}, {"t": "p", "text": "He hesitated."}, {"t": "p", "text": "It was not a long hesitation. Not even a full second. Just enough."}, {"t": "p", "text": "Just enough for the passing lane to narrow. Just enough for doubt to arrive. Just enough for somebody on the sideline to see the delay before they saw the reason for it."}, {"t": "p", "text": "By the time he released the ball, the moment had already gone."}, {"t": "p", "text": "The pass was wrong."}, {"t": "p", "text": "A voice cracked at him straight away."}, {"t": "p", "text": "Wake up."}, {"t": "p", "text": "Another came after it."}, {"t": "p", "text": "Move it quicker."}, {"t": "p", "text": "He felt the heat climb into his face before he even turned away. He already knew how the moment looked from the outside. Slow. Careless. Switched off. Another loose decision from a player who could never quite be trusted to do the simple thing cleanly."}, {"t": "p", "text": "But that was not what it felt like on the inside."}, {"t": "p", "text": "On the inside, it felt like noise, movement, pressure, and uncertainty arriving all at once. It felt like trying to make a fast decision with one piece of the picture missing. It felt like needing one more look when the game only gave you time for one. It felt like knowing that if you got it wrong, people would assume the problem was your football brain, your focus, your attitude, or your effort."}, {"t": "p", "text": "So he did what many players do when they are not fully sure."}, {"t": "p", "text": "He waited a fraction too long."}, {"t": "p", "text": "Then he got blamed for the delay."}, {"t": "p", "text": "That moment, in one form or another, happens far more often than most people realise."}, {"t": "p", "text": "Sometimes it happens under floodlights, when dark kits flatten into each other and movement becomes harder to sort quickly. Sometimes it happens on a bright morning when bibs, cones, grass, sunlight, and shadows all compete for the same split second of attention. Sometimes it happens in training, where the drill looks simple to the coach because the colours look clear to everyone standing still. Sometimes it happens in a match, where the player has no time to stop, explain, or ask for help before the next decision arrives."}, {"t": "p", "text": "And almost every time, the mistake is judged before it is understood."}, {"t": "p", "text": "The coach may think the player switched off."}, {"t": "p", "text": "A parent watching from the side may feel confused, knowing their child can clearly play, but not knowing why the same problems keep appearing."}, {"t": "p", "text": "The player may feel ashamed without having the words to explain why some moments in football seem to collapse faster for them than they do for everyone else."}, {"t": "p", "text": "This is where the real problem begins."}, {"t": "p", "text": "Because when visual confusion is hidden, people rarely call it visual confusion."}, {"t": "p", "text": "They call it inconsistency."}, {"t": "p", "text": "They call it poor concentration."}, {"t": "p", "text": "They call it bad decision-making."}, {"t": "p", "text": "They call it not reacting quickly enough."}, {"t": "p", "text": "They call it lack of football intelligence."}, {"t": "p", "text": "They call it not trying hard enough."}, {"t": "p", "text": "And the longer that goes on, the more damaging it becomes, especially for children."}, {"t": "p", "text": "A child who does not know they are colour blind does not walk onto the pitch thinking, My vision works differently from everyone else’s. A child usually assumes everyone sees the game more or less the same way they do. If certain bibs disappear into the grass, if certain kits merge too easily, if lines, cones, or moving shirts take too long to separate in the moment, that child often does not know it is unusual. They just know that some parts of football feel harder than they should."}, {"t": "p", "text": "So they adapt."}, {"t": "p", "text": "They double-check."}, {"t": "p", "text": "They hold the ball a little too long."}, {"t": "p", "text": "They play safe when they are unsure."}, {"t": "p", "text": "They hesitate when the picture is not clear."}, {"t": "p", "text": "They get there half a second late."}, {"t": "p", "text": "They lose trust in what they first saw."}, {"t": "p", "text": "And because none of that looks dramatic from the outside, it can go unnoticed for years."}, {"t": "p", "text": "That is one reason this book matters."}, {"t": "p", "text": "Another is that football is built on rapid visual information."}, {"t": "p", "text": "The game asks players to identify teammates, opponents, space, movement, pressure, lines, and passing options almost instantly. Colour is not decoration in football. It is part of the information system of the game. Kits, bibs, cones, line markings, and visual cues all help players sort the pitch quickly enough to act with confidence."}, {"t": "p", "text": "When that system becomes unreliable for one player, the effect is not always obvious. Sometimes it shows up as a wrong pass. Sometimes it shows up as a player who looks hesitant, tense, or strangely inconsistent. Sometimes it shows up as a child who seems far better when training alone than when surrounded by similar colours, moving bodies, and split-second decisions."}, {"t": "p", "text": "The tragedy is that hidden visual difficulty can easily be mistaken for hidden personal weakness."}, {"t": "p", "text": "That is why this book exists."}, {"t": "p", "text": "It exists for the player who has started doubting themselves."}, {"t": "p", "text": "It exists for the parent who sensed something was off but could not yet name it."}, {"t": "p", "text": "It exists for the coach who wants to help without lowering standards, embarrassing the player, or making the whole issue feel bigger than it needs to be."}, {"t": "p", "text": "Most of all, it exists to challenge one damaging habit that runs quietly through too many football environments:"}, {"t": "p", "text": "blaming the player before checking the environment."}, {"t": "p", "text": "For some children, football becomes a place where they slowly stop trusting themselves."}, {"t": "p", "text": "They know they love the game. They know they work hard. They know they can do things in one moment that prove they have ability. Then, in the next moment, something goes wrong so quickly and so publicly that they cannot recover before the judgment lands. A pass goes astray. A runner is missed. A cone is skipped. A line is not seen soon enough. The drill moves on. The match moves on. The shouting moves on. But the player keeps hold of the feeling."}, {"t": "p", "text": "That feeling builds."}, {"t": "p", "text": "A child starts thinking, Why does this keep happening to me?"}, {"t": "p", "text": "They may not say it out loud."}, {"t": "p", "text": "Instead, it shows up in smaller ways."}, {"t": "p", "text": "The extra touch they did not need."}, {"t": "p", "text": "The safer pass they choose because they do not fully trust the picture."}, {"t": "p", "text": "The silence when a coach asks what happened."}, {"t": "p", "text": "The shrinking body language after another public mistake."}, {"t": "p", "text": "The quiet dread before bibs come out."}, {"t": "p", "text": "The drop in freedom when colours get worse."}, {"t": "p", "text": "The relief when training becomes simpler again."}, {"t": "p", "text": "The strange difference between what the player can do on their own and what they can do under pressure in a crowded game."}, {"t": "p", "text": "These things matter because football is not only technical and physical. It is emotional. It shapes identity. It gives children a place to belong, a way to feel capable, a language for confidence, risk, and joy. When the game repeatedly makes a child feel slow, confused, or exposed, the damage does not stay inside one misplaced pass. It can settle into the way they see themselves."}, {"t": "p", "text": "Some players begin to believe they are naturally unreliable."}, {"t": "p", "text": "Some start to think they panic too much."}, {"t": "p", "text": "Some feel stupid."}, {"t": "p", "text": "Some feel embarrassed."}, {"t": "p", "text": "Some stop asking for the ball."}, {"t": "p", "text": "Some begin to look like they care less, when the truth is that they care so much that every mistake hits twice as hard."}, {"t": "p", "text": "This matters just as much to the parent on the side of the pitch."}, {"t": "p", "text": "A parent often sees fragments, not causes."}, {"t": "p", "text": "They see a child who can look brilliant one week and oddly lost the next. They hear the coach say their child must release the ball quicker. They watch them hesitate in situations that seem obvious from the touchline. They feel, in that uncomfortable way parents do, that something is not quite adding up. But unless somebody raises the right possibility, colour blindness may not even enter the conversation."}, {"t": "p", "text": "So parents search in the wrong places."}, {"t": "p", "text": "Confidence."}, {"t": "p", "text": "Nerves."}, {"t": "p", "text": "Concentration."}, {"t": "p", "text": "Maturity."}, {"t": "p", "text": "Effort."}, {"t": "p", "text": "Attitude."}, {"t": "p", "text": "And because many children do not know they are seeing the world differently, they cannot solve the mystery either. They cannot explain a problem they do not know they have."}, {"t": "p", "text": "This matters to coaches as well, especially good coaches."}, {"t": "p", "text": "Most coaches are trying to improve players, not harm them. They are trying to speed up decisions, sharpen habits, and create higher standards. But a coach can only coach what they think they are looking at. If hesitation is interpreted as laziness, it gets coached one way. If it is interpreted as fear, it gets coached another way. If it is interpreted as visual uncertainty under pressure, the whole response changes."}, {"t": "p", "text": "That difference matters."}, {"t": "p", "text": "Because once the real problem is seen more clearly, the solutions become more useful."}, {"t": "p", "text": "Instead of repeating, Be quicker, you start asking, What exactly is the player struggling to sort quickly enough?"}, {"t": "p", "text": "Instead of assuming the child is switched off, you start noticing when the struggle appears and when it disappears."}, {"t": "p", "text": "Instead of making the player feel singled out, you start making the environment clearer for everyone."}, {"t": "p", "text": "That is one of the most important ideas in this book."}, {"t": "p", "text": "This is not about lowering standards."}, {"t": "p", "text": "It is about removing unnecessary confusion."}, {"t": "p", "text": "There is a big difference."}, {"t": "p", "text": "Lowering standards says, The player cannot cope, so make the game easier."}, {"t": "p", "text": "Improving clarity says, The information is unclear, so make the game fairer."}, {"t": "p", "text": "Those are not the same thing."}, {"t": "p", "text": "A clear environment does not weaken football. It strengthens it. Better contrast, smarter communication, better bib choices, clearer cues, and fewer avoidable visual traps do not only help colour-blind players. They help sessions run better. They help decisions happen earlier. They help everyone process the game more quickly."}, {"t": "p", "text": "That matters because colour blindness is often treated as a minor side issue, something people think about only when fans complain about a bad kit clash on television. But the problem is deeper than that. For a player, especially a young one, colour blindness can affect not just what they see, but how quickly they trust what they see. It can change the speed of certainty. It can add doubt where others play on instinct."}, {"t": "p", "text": "And in football, doubt is expensive."}, {"t": "p", "text": "A split second is enough."}, {"t": "p", "text": "Enough to miss the window for the pass."}, {"t": "p", "text": "Enough to delay the first-time decision."}, {"t": "p", "text": "Enough to get closed down."}, {"t": "p", "text": "Enough to make a player look less aware than they really are."}, {"t": "p", "text": "Enough to turn a hidden visual issue into a visible football mistake."}, {"t": "p", "text": "That is why the hidden part matters so much."}, {"t": "p", "text": "People respond very differently to a problem once it has a name."}, {"t": "p", "text": "Before the name, there is blame."}, {"t": "p", "text": "After the name, there is context."}, {"t": "p", "text": "Before the name, the player may look careless."}, {"t": "p", "text": "After the name, the same moment may look understandable."}, {"t": "p", "text": "Before the name, the parent feels stuck."}, {"t": "p", "text": "After the name, the parent has somewhere to begin."}, {"t": "p", "text": "Before the name, the coach may push harder in the wrong direction."}, {"t": "p", "text": "After the name, the coach can make changes that actually help."}, {"t": "p", "text": "This book begins here because the emotional truth has to come before the practical advice."}, {"t": "p", "text": "If the reader does not feel the cost of misunderstanding, the solutions will sound smaller than they are."}, {"t": "p", "text": "If the player does not feel seen, they will treat the rest of the book like somebody else’s explanation."}, {"t": "p", "text": "If the parent does not recognise the hidden pattern, they may miss it again."}, {"t": "p", "text": "If the coach does not understand how ordinary this misreading can be, the adaptations may feel unnecessary."}, {"t": "p", "text": "So this chapter is not here to drown the reader in science. It is here to make something visible."}, {"t": "p", "text": "The real issue is not that colour blindness makes somebody bad at football."}, {"t": "p", "text": "The real issue is that football asks players to read fast, moving, colour-coded information under pressure, and some players are doing that with a different visual picture from the one everybody assumes."}, {"t": "p", "text": "That difference can hide in plain sight."}, {"t": "p", "text": "It can hide inside a player’s so-called inconsistency."}, {"t": "p", "text": "It can hide inside a coach’s frustration."}, {"t": "p", "text": "It can hide inside a parent’s confusion."}, {"t": "p", "text": "It can hide inside years of being misunderstood."}, {"t": "p", "text": "And once enough hidden moments pile up, the player can start to disappear inside them."}, {"t": "p", "text": "That is where Number 12 lives."}, {"t": "p", "text": "Not just as a shirt number, but as a feeling."}, {"t": "p", "text": "The one waiting longer than he plays."}, {"t": "p", "text": "The one almost trusted."}, {"t": "p", "text": "The one close enough to the team to be seen, but not fully understood inside it."}, {"t": "p", "text": "The one warming up on the side while the game moves on without him."}, {"t": "p", "text": "The one who looks like he should be doing better and cannot explain why some parts of the game keep slipping away from him."}, {"t": "p", "text": "The one blamed in public for a problem that was never fully visible in the first place."}, {"t": "p", "text": "That is why this book matters."}, {"t": "p", "text": "It matters because children should not have to build their identity around a mistake nobody understood properly."}, {"t": "p", "text": "It matters because parents should not have to rely on guesswork when the signs are there but unnamed."}, {"t": "p", "text": "It matters because coaches should have better tools than frustration."}, {"t": "p", "text": "It matters because football is supposed to reveal ability, not hide it behind avoidable confusion."}, {"t": "p", "text": "And it matters because once the problem is seen clearly, a lot can change."}, {"t": "p", "text": "The player can stop calling themselves stupid for moments that were never only about intelligence."}, {"t": "p", "text": "The parent can stop guessing."}, {"t": "p", "text": "The coach can stop assuming."}, {"t": "p", "text": "The environment can become clearer, calmer, and fairer without losing competitiveness."}, {"t": "p", "text": "The game can start making more sense."}, {"t": "p", "text": "That does not mean every struggle disappears overnight."}, {"t": "p", "text": "It does not mean every bad moment was caused by colour blindness."}, {"t": "p", "text": "It does not mean one explanation solves everything."}, {"t": "p", "text": "But it does mean that some players who have spent years blaming themselves may finally understand that the whole story was never sitting inside them alone."}, {"t": "p", "text": "Sometimes the missing piece was on the pitch all along."}, {"t": "p", "text": "In the bibs."}, {"t": "p", "text": "In the kits."}, {"t": "p", "text": "In the cones."}, {"t": "p", "text": "In the lines."}, {"t": "p", "text": "In the speed of the game."}, {"t": "p", "text": "In the half-second where certainty failed and judgment rushed in."}, {"t": "p", "text": "And sometimes the difference between a player being judged and a player being understood is simply whether anybody knew what they were really looking at."}, {"t": "p", "text": "That is why this book matters."}, {"t": "h2", "text": "Chapter 1 Summary"}, {"t": "p", "text": "Football can make a hidden visual problem look like a football problem."}, {"t": "p", "text": "A player may be blamed for hesitation, inconsistency, or poor decisions when the real issue is not effort or intelligence, but uncertainty in what they are seeing under pressure."}, {"t": "p", "text": "Children often do not realise they are seeing the game differently. They usually assume everyone sees what they see, which means the problem can go unnoticed for years."}, {"t": "p", "text": "Parents may feel that something is wrong without knowing what to call it. Coaches may respond to the visible mistake without recognising the hidden cause."}, {"t": "p", "text": "This book matters because football depends on rapid visual information. When that information becomes unreliable, confidence, enjoyment, and development can all suffer."}, {"t": "p", "text": "The goal is not to lower standards. The goal is to make the environment clearer."}, {"t": "p", "text": "Stop blaming the player. Start fixing the environment."}, {"t": "h1", "text": "Chapter 2 - What Colour Blindness Is—and Is Not", "id": "chapter-2-what-colour-blindness-is-and-is-not"}, {"t": "p", "text": "Most people hear the words colour blind and imagine something far more extreme than what most players actually experience."}, {"t": "p", "text": "They imagine a world drained of colour. A black-and-white world. A world where a person looks at the pitch and sees nothing but grey shapes moving around on a flat surface."}, {"t": "p", "text": "That image is powerful."}, {"t": "p", "text": "It is also wrong for most people."}, {"t": "p", "text": "Most colour-blind players are not living in a black-and-white world. They are living in a world where certain colours, shades, and contrasts do not separate in the clean, reliable way other people assume they do. They still see colour. They still see the game. But some of the visual information the game depends on can collapse together at exactly the wrong moment."}, {"t": "p", "text": "That difference matters."}, {"t": "p", "text": "Because if people misunderstand what colour blindness is, they will misunderstand what help is needed."}, {"t": "p", "text": "If they think it means total darkness where colour should be, they may dismiss the problem when the player clearly seems to see plenty."}, {"t": "p", "text": "If they think it is only a tiny issue with a few crayons or traffic lights, they may dismiss the problem because it sounds too small to matter in football."}, {"t": "p", "text": "If they think every colour-blind person sees exactly the same way, they may miss the fact that two players can both be colour blind and still struggle with different situations."}, {"t": "p", "text": "Before this book can talk about the football problem properly, it has to make one thing clear:"}, {"t": "p", "text": "colour blindness is not one single experience."}, {"t": "p", "text": "It is a difference in how the eye and brain process certain colour information. That means some colours that seem clearly separate to most people can appear too close, too muddy, too similar, or too unreliable to trust quickly. The issue is not always whether the player can eventually work it out. Very often, the issue is whether they can work it out fast enough, confidently enough, and often enough under pressure."}, {"t": "p", "text": "That is the football version of the problem."}, {"t": "p", "text": "But before football, there is the simple human version."}, {"t": "p", "text": "A child grows up learning colours by being told what colours are. Grass is green. The sky is blue. Strawberries are red. School ties match school uniforms. Socks come in pairs. Coats look the same as they did in the shop. They learn the labels first. That means a child can say the right colour"}, {"t": "p", "text": "word long before anyone knows whether they are seeing colour in the same way as the person teaching them."}, {"t": "p", "text": "That is one reason colour blindness often hides so well."}, {"t": "p", "text": "The child does not announce it."}, {"t": "p", "text": "The adults do not expect it."}, {"t": "p", "text": "And the world keeps moving as if nothing is different."}, {"t": "p", "text": "Most common colour blindness is inherited. That means many people are born with it and grow up assuming their version of normal is simply normal. They do not wake up one day feeling that something dramatic has changed. They build their understanding of the world inside the vision they have always had. That is why so many people do not realise early on. There is no obvious before and after. There is only one lifelong picture, and it is the only picture they know."}, {"t": "p", "text": "The most common form is red-green colour blindness."}, {"t": "p", "text": "That name can be misleading too."}, {"t": "p", "text": "It does not mean a person only struggles with pure red objects and pure green objects. It means the visual confusion often sits in that part of the colour world, and that confusion can spill outward into browns, oranges, certain greys, certain dark"}, {"t": "p", "text": "shades, and combinations that contain similar colour information. What looks bright and obvious to one person can look flat and uncertain to another. What seems like a clear contrast on a coach’s training plan can disappear when it hits the grass, the weather, the lighting, and the pace of a session."}, {"t": "p", "text": "That is why colour blindness is not really a problem of colour names."}, {"t": "p", "text": "It is a problem of visual separation."}, {"t": "p", "text": "Can this colour be told apart from that one quickly enough?"}, {"t": "p", "text": "Can this shirt be trusted at a glance?"}, {"t": "p", "text": "Can this cone be found before the player overruns it?"}, {"t": "p", "text": "Can this line be picked up before the ball runs out of play?"}, {"t": "p", "text": "Can this decision be made before doubt gets involved?"}, {"t": "p", "text": "Those are the questions that matter."}, {"t": "p", "text": "There are different types of colour blindness, and most readers do not need a medical lecture to understand them. They need the plain-English version."}, {"t": "p", "text": "Some people struggle more with reds."}, {"t": "p", "text": "Some struggle more with greens."}, {"t": "p", "text": "Some struggle with both in ways that overlap."}, {"t": "p", "text": "A much smaller number struggle with blue-yellow colour differences."}, {"t": "p", "text": "And a very rare number of people have forms of colour vision loss that are far more severe and can come with other problems, such as strong light sensitivity and poorer overall visual clarity."}, {"t": "p", "text": "That last group matters, but it is not the typical story most people mean when they say colour blind."}, {"t": "p", "text": "That is important, because one of the most damaging myths is the idea that every colour-blind person sees like a rare severe case."}, {"t": "p", "text": "Most do not."}, {"t": "p", "text": "Most colour-blind players will not describe the world as colourless. They will describe it as inconsistent, awkward, unreliable, or hard to trust in certain moments. They may struggle more in one kit clash than another. They may be completely fine in one drill and then look lost as soon as the bib colours change. They may see one red object clearly against one background, then lose another object that seems almost the same once the light changes."}, {"t": "p", "text": "That variation can make the problem harder for other people to understand."}, {"t": "p", "text": "It can also make the player doubt themselves."}, {"t": "p", "text": "If the struggle only appears in certain conditions, it is tempting for everyone around them to think the problem cannot be real. If the player can cope well one day and poorly the next, people start reaching for the usual explanations."}, {"t": "p", "text": "Lazy."}, {"t": "p", "text": "Distracted."}, {"t": "p", "text": "Not switched on."}, {"t": "p", "text": "Poor decision-maker."}, {"t": "p", "text": "Needs to concentrate."}, {"t": "p", "text": "But colour blindness does not have to ruin every moment to matter."}, {"t": "p", "text": "It only has to ruin enough important moments often enough to shape confidence, trust, and performance."}, {"t": "p", "text": "That is why “what it is not” matters just as much as “what it is.”"}, {"t": "p", "text": "Colour blindness is not stupidity."}, {"t": "p", "text": "It is not laziness."}, {"t": "p", "text": "It is not weakness."}, {"t": "p", "text": "It is not a lack of effort."}, {"t": "p", "text": "It is not proof that a player lacks football intelligence."}, {"t": "p", "text": "It is not a reason to pity somebody."}, {"t": "p", "text": "And it is not an excuse to lower every standard around them."}, {"t": "p", "text": "It is a difference in perception."}, {"t": "p", "text": "That sounds simple, but it changes everything."}, {"t": "p", "text": "If the problem is laziness, the answer is pressure."}, {"t": "p", "text": "If the problem is perception, the answer is clarity."}, {"t": "p", "text": "Those are very different coaching paths."}, {"t": "p", "text": "Colour blindness is also not always obvious in a normal eye test."}, {"t": "p", "text": "That surprises many people."}, {"t": "p", "text": "A child can have what adults call good eyesight and still be colour blind. They can read letters on a chart. They can spot the ball. They can move well. They can look physically coordinated. And still, in certain colour situations, they can struggle far more than anyone expects."}, {"t": "p", "text": "That mismatch is one reason the condition gets missed."}, {"t": "p", "text": "People assume eyesight is one thing."}, {"t": "p", "text": "Sharp or blurry."}, {"t": "p", "text": "Good or bad."}, {"t": "p", "text": "Passed or failed."}, {"t": "p", "text": "But colour vision sits inside a different part of the visual experience. A player may see shapes sharply enough and still have trouble separating the information those shapes carry when colour is doing too much of the work."}, {"t": "p", "text": "That is one reason a player can look capable and confused at the same time."}, {"t": "p", "text": "It is also why some players go years without anyone joining the dots."}, {"t": "p", "text": "The dots themselves do not seem dramatic enough."}, {"t": "p", "text": "A wrong pass here."}, {"t": "p", "text": "A hesitation there."}, {"t": "p", "text": "A strange mistake with cones."}, {"t": "p", "text": "An odd problem with matching clothes."}, {"t": "p", "text": "A tie that looks wrong."}, {"t": "p", "text": "Socks that do not match."}, {"t": "p", "text": "A coat bought in the wrong shade."}, {"t": "p", "text": "A drawing coloured differently from what adults expect."}, {"t": "p", "text": "None of those things alone shouts colour blindness."}, {"t": "p", "text": "Together, though, they start to tell a story."}, {"t": "p", "text": "Not always."}, {"t": "p", "text": "But often enough that adults should know how to listen for it."}, {"t": "p", "text": "Another myth that needs dealing with early is the idea that colour-blind people can simply try harder."}, {"t": "p", "text": "That sounds harsh when said directly, so it usually comes out in softer words."}, {"t": "p", "text": "Look properly."}, {"t": "p", "text": "Take your time."}, {"t": "p", "text": "Concentrate."}, {"t": "p", "text": "You’ve got to wake up."}, {"t": "p", "text": "But trying harder does not change the colour information coming in. It may help a player compensate in the moment. It may make them slower, more careful, or more deliberate. It may force them to use different clues. But it does not make the visual problem disappear. In fact, that extra effort is often part of the problem. The more a player has to consciously work around unreliable cues, the less free they feel to play instinctively."}, {"t": "p", "text": "That is why some players describe colour blindness not as blindness, but as effort."}, {"t": "p", "text": "Extra effort."}, {"t": "p", "text": "Unseen effort."}, {"t": "p", "text": "Effort nobody else notices because it happens inside the moment before the pass."}, {"t": "p", "text": "The problem is not always that they cannot work it out."}, {"t": "p", "text": "The problem is the cost of working it out."}, {"t": "p", "text": "That cost can be mental, emotional, and practical."}, {"t": "p", "text": "Mental, because the player spends energy checking and rechecking."}, {"t": "p", "text": "Emotional, because repeated uncertainty damages confidence."}, {"t": "p", "text": "Practical, because football punishes hesitation even when the hesitation makes perfect sense."}, {"t": "p", "text": "This chapter is also the right place to say clearly that colour blindness is common."}, {"t": "p", "text": "Not rare."}, {"t": "p", "text": "Not unusual."}, {"t": "p", "text": "Not some tiny fringe issue affecting one or two people in the whole game."}, {"t": "p", "text": "Common enough that every serious football environment should assume it may already be present, whether anyone has named it yet or not."}, {"t": "p", "text": "That matters because common problems deserve normal awareness."}, {"t": "p", "text": "The more something is treated like a strange exception, the longer it stays hidden."}, {"t": "p", "text": "And the longer it stays hidden, the more chance there is that a player grows up blaming themselves for a problem that should have been recognised earlier."}, {"t": "p", "text": "It is also important to separate colour blindness from every other visual issue."}, {"t": "p", "text": "Some players may be colour blind and also have poor eyesight."}, {"t": "p", "text": "Some may be colour blind and not know they need glasses or contact lenses as well."}, {"t": "p", "text": "Some may have no general eyesight problem at all and still struggle badly with colour-based information."}, {"t": "p", "text": "And a much smaller group may have rarer visual conditions that include colour problems alongside glare, light sensitivity, or reduced sharpness."}, {"t": "p", "text": "These differences matter because the help has to match the problem."}, {"t": "p", "text": "Not every visual struggle in football comes from colour blindness."}, {"t": "p", "text": "Not every colour-blind struggle comes from blurry sight."}, {"t": "p", "text": "And not every player who says sunlight feels hard to manage is describing the exact same thing."}, {"t": "p", "text": "That does not mean we ignore those experiences."}, {"t": "p", "text": "It means we describe them honestly."}, {"t": "p", "text": "The more precise the understanding, the more useful the support."}, {"t": "p", "text": "That is what this chapter is trying to build: useful understanding."}, {"t": "p", "text": "Not scientific performance for its own sake."}, {"t": "p", "text": "Not complicated language that makes the reader feel shut out."}, {"t": "p", "text": "Just enough truth, clearly explained, so that the rest of the book can stand on solid ground."}, {"t": "p", "text": "If a parent reads this chapter, they should come away thinking, This is wider and more common than I realised, and more subtle too."}, {"t": "p", "text": "If a coach reads this chapter, they should come away thinking, I need to stop assuming that seeing sharply means seeing clearly in the ways football demands."}, {"t": "p", "text": "If a player reads this chapter, they should come away thinking, So this is why some moments feel strange, and why I am not imagining it."}, {"t": "p", "text": "That is the real goal."}, {"t": "p", "text": "Because once the problem is understood in the right way, the shame around it starts to weaken."}, {"t": "p", "text": "A player no longer has to think, I must be useless in these moments."}, {"t": "p", "text": "They can begin to think, The visual information is not as clean for me here."}, {"t": "p", "text": "That is not a small shift."}, {"t": "p", "text": "It is one of the most important shifts in the whole book."}, {"t": "p", "text": "Shame says, Something is wrong with me."}, {"t": "p", "text": "Understanding says, Something is happening here, and now I can name it."}, {"t": "p", "text": "Shame closes people down."}, {"t": "p", "text": "Understanding opens the door to adaptation."}, {"t": "p", "text": "And adaptation is where hope begins."}, {"t": "p", "text": "That hope does not start with pretending colour blindness is nothing."}, {"t": "p", "text": "It starts with describing it properly."}, {"t": "p", "text": "Colour blindness is real."}, {"t": "p", "text": "It is varied."}, {"t": "p", "text": "It is common."}, {"t": "p", "text": "It is often missed."}, {"t": "p", "text": "It does not make a person less intelligent."}, {"t": "p", "text": "It does not mean they see only in black and white."}, {"t": "p", "text": "It does not always show up in simple ways."}, {"t": "p", "text": "And in football, where colour often carries information at speed, it can matter far more than most people realise."}, {"t": "p", "text": "That is what it is."}, {"t": "p", "text": "And now, just as importantly, the reader knows what it is not."}, {"t": "h2", "text": "Chapter 2 Summary"}, {"t": "p", "text": "Most colour-blind people do not see only in black and white."}, {"t": "p", "text": "Colour blindness is not one single experience. It varies by type, severity, situation, background, and lighting."}, {"t": "p", "text": "The most common forms usually affect red-green colour differences, but the real issue is not colour names. The real issue is fast visual separation."}, {"t": "p", "text": "Colour blindness is not stupidity, laziness, weakness, or low football intelligence."}, {"t": "p", "text": "A player can have otherwise good eyesight and still struggle with colour-based information."}, {"t": "p", "text": "Because the condition is common, subtle, and often lifelong, many children grow up not realising they see differently."}, {"t": "p", "text": "Understanding colour blindness properly reduces shame and makes useful adaptation possible."}, {"t": "p", "text": "The problem is real. The player is not imagining it. And the right understanding changes what comes next."}, {"t": "h1", "text": "Chapter 3 - Why It Gets Missed", "id": "chapter-3-why-it-gets-missed"}, {"t": "p", "text": "One of the hardest things about colour blindness is that it can stay hidden inside ordinary life for a very long time."}, {"t": "p", "text": "Not because it is harmless."}, {"t": "p", "text": "Not because it is rare."}, {"t": "p", "text": "But because it is easy for other people to mistake it for something else."}, {"t": "p", "text": "A child does not usually stand in the kitchen one day and announce that the world looks different to them."}, {"t": "p", "text": "They do not have a second version of vision to compare it to."}, {"t": "p", "text": "They have only ever seen one way."}, {"t": "p", "text": "So when they reach for the wrong socks, colour the grass strangely, hesitate in front of certain bibs, or seem unsure in moments that look obvious to everyone else, they do not automatically think, Something is different about the way I see colour."}, {"t": "p", "text": "They think, This is just how things look."}, {"t": "p", "text": "That is where the silence begins."}, {"t": "p", "text": "And once that silence is in place, the misunderstanding around it can last for years."}, {"t": "p", "text": "Children learn early that adults expect certainty."}, {"t": "p", "text": "What colour is this?"}, {"t": "p", "text": "Which team are you on?"}, {"t": "p", "text": "Follow the red cones."}, {"t": "p", "text": "Mark the player in green."}, {"t": "p", "text": "Bring the blue folder."}, {"t": "p", "text": "Wear the right tie."}, {"t": "p", "text": "Stay inside the red line."}, {"t": "p", "text": "To adults, these instructions sound simple. They are given quickly, casually, and without much thought. But a child who is colour blind may be doing something very different underneath that apparent simplicity. They may be guessing. They may be using context. They may be copying what another child did. They may be delaying just long enough to make sure they are not about to get it wrong in public."}, {"t": "p", "text": "That is one of the main reasons colour blindness gets missed."}, {"t": "p", "text": "Children become good at compensating before anyone realises there is something to compensate for."}, {"t": "p", "text": "A child sees that grass is always called green, so they learn that grass is green."}, {"t": "p", "text": "They learn that certain signs usually mean certain things."}, {"t": "p", "text": "They learn which shirt belongs to which team because of the badge, the shape, the shorts, the socks, the movement, the order in which people line up, or the fact that everyone else seems to know."}, {"t": "p", "text": "They learn how to survive the confusion without ever naming it."}, {"t": "p", "text": "From the outside, this can look like success."}, {"t": "p", "text": "From the inside, it can feel like constant low-level uncertainty."}, {"t": "p", "text": "That uncertainty rarely gets recognised for what it is."}, {"t": "p", "text": "Instead, adults tend to notice the visible consequence."}, {"t": "p", "text": "The delay."}, {"t": "p", "text": "The odd mistake."}, {"t": "p", "text": "The wrong choice."}, {"t": "p", "text": "The wrong colour."}, {"t": "p", "text": "The inconsistent performance."}, {"t": "p", "text": "And once adults start building an explanation around those visible moments, colour blindness"}, {"t": "p", "text": "can disappear behind the story they have already chosen."}, {"t": "p", "text": "Careless."}, {"t": "p", "text": "Distracted."}, {"t": "p", "text": "Immature."}, {"t": "p", "text": "Not concentrating."}, {"t": "p", "text": "Rushing."}, {"t": "p", "text": "Not listening."}, {"t": "p", "text": "Trying to be clever."}, {"t": "p", "text": "Poor decision-maker."}, {"t": "p", "text": "Not switched on."}, {"t": "p", "text": "That is how the real cause gets covered over."}, {"t": "p", "text": "Not usually by cruelty."}, {"t": "p", "text": "More often by habit."}, {"t": "p", "text": "Adults are used to reading behaviour before they read perception."}, {"t": "p", "text": "If a child gets something wrong, most people instinctively ask whether the child was paying attention, trying hard enough, or behaving properly. They do not first ask whether the information itself was harder for that child to process."}, {"t": "p", "text": "That is especially true in football."}, {"t": "p", "text": "A child who hesitates on the ball is often coached for speed."}, {"t": "p", "text": "A child who passes to the wrong team is often coached for awareness."}, {"t": "p", "text": "A child who runs beyond a line or ignores a cone is often coached for concentration."}, {"t": "p", "text": "A child who keeps making certain visual mistakes is often told to wake up, scan more, be sharper, release it earlier, or focus."}, {"t": "p", "text": "Sometimes those messages are useful."}, {"t": "p", "text": "Sometimes they are completely aimed at the wrong problem."}, {"t": "p", "text": "That is what makes missed colour blindness so damaging."}, {"t": "p", "text": "It does not only stay hidden."}, {"t": "p", "text": "It gets actively translated into other meanings."}, {"t": "p", "text": "A child may start to believe they are unreliable."}, {"t": "p", "text": "A parent may start to think their child lacks confidence."}, {"t": "p", "text": "A coach may start to think the player cannot handle the speed of the game."}, {"t": "p", "text": "A teacher may think the child is careless with colour-based tasks."}, {"t": "p", "text": "And because each adult is seeing only a piece of the puzzle, the full picture never gets assembled."}, {"t": "p", "text": "Another reason colour blindness gets missed is that it is inconsistent."}, {"t": "p", "text": "Or, more accurately, it looks inconsistent."}, {"t": "p", "text": "Some situations are manageable."}, {"t": "p", "text": "Some are not."}, {"t": "p", "text": "Some colours separate well enough against one background, then collapse against another."}, {"t": "p", "text": "One training session feels fine."}, {"t": "p", "text": "The next feels impossible."}, {"t": "p", "text": "One kit is clear."}, {"t": "p", "text": "Another is a mess."}, {"t": "p", "text": "One drill works."}, {"t": "p", "text": "Another suddenly turns the pitch into confusion."}, {"t": "p", "text": "This apparent inconsistency is dangerous because people often trust consistent problems more than inconsistent ones."}, {"t": "p", "text": "If a child struggled in every single colour situation, adults might notice sooner."}, {"t": "p", "text": "But when the problem appears only under certain combinations of colours, lighting, surfaces, speed, and pressure, it is easier for people to dismiss it."}, {"t": "p", "text": "They think, You were fine last week."}, {"t": "p", "text": "They think, You can clearly see it if you try."}, {"t": "p", "text": "They think, This cannot be a real visual issue if it only happens sometimes."}, {"t": "p", "text": "But that is exactly how many visual issues behave."}, {"t": "p", "text": "They are not always on at the same level because the environment changes."}, {"t": "p", "text": "Grass changes."}, {"t": "p", "text": "Light changes."}, {"t": "p", "text": "Weather changes."}, {"t": "p", "text": "Kits change."}, {"t": "p", "text": "Bibs change."}, {"t": "p", "text": "Cones change."}, {"t": "p", "text": "Backgrounds change."}, {"t": "p", "text": "The speed of the session changes."}, {"t": "p", "text": "The player’s confidence changes too."}, {"t": "p", "text": "And all of that affects how manageable the visual task feels in the moment."}, {"t": "p", "text": "That is why a child can look brilliant when training alone and confused when surrounded by moving colours."}, {"t": "p", "text": "It is why a player can look composed in one team kit and uneasy in another."}, {"t": "p", "text": "It is why adults who are not looking for the pattern often miss the pattern completely."}, {"t": "p", "text": "Routine testing is another major reason colour blindness gets missed."}, {"t": "p", "text": "Many parents assume that if their child has had an eye test, anything important would already have been picked up."}, {"t": "p", "text": "That is an understandable assumption."}, {"t": "p", "text": "It is also one that causes a lot of delay."}, {"t": "p", "text": "People often think of eye tests as full checks for all relevant vision problems. In reality, the things being checked most routinely are often different from what parents imagine. A child may be tested for how sharply they can see, how their eyes move, or whether they need glasses, while colour vision is never raised at all unless somebody has a specific reason to ask for it."}, {"t": "p", "text": "That means a child can pass the kind of vision check adults trust and still be colour blind."}, {"t": "p", "text": "So the family relaxes."}, {"t": "p", "text": "The school assumes everything is normal."}, {"t": "p", "text": "The coach assumes the issue must be something else."}, {"t": "p", "text": "And the child carries on adapting in silence."}, {"t": "p", "text": "This is one of the reasons the book keeps returning to the same point: if nobody looks for colour blindness properly, colour blindness can hide inside normal life for a very long time."}, {"t": "p", "text": "It also gets missed because children are often embarrassed long before they are informed."}, {"t": "p", "text": "Even without a diagnosis, many children learn quickly that getting colour things wrong attracts attention."}, {"t": "p", "text": "Wrong socks."}, {"t": "p", "text": "Wrong tie."}, {"t": "p", "text": "Wrong folder."}, {"t": "p", "text": "Wrong answer."}, {"t": "p", "text": "Wrong bib."}, {"t": "p", "text": "Wrong pass."}, {"t": "p", "text": "Wrong cone."}, {"t": "p", "text": "Wrong team."}, {"t": "p", "text": "They may not understand what the pattern means, but they understand how it feels."}, {"t": "p", "text": "It feels exposing."}, {"t": "p", "text": "It feels childish."}, {"t": "p", "text": "It feels like one more way to look stupid in front of other people."}, {"t": "p", "text": "So instead of asking for help, many children become quieter."}, {"t": "p", "text": "They say less."}, {"t": "p", "text": "They guess more."}, {"t": "p", "text": "They copy faster."}, {"t": "p", "text": "They keep the problem moving instead of stopping it in the open."}, {"t": "p", "text": "That can make them look less needy, less disruptive, and less obvious."}, {"t": "p", "text": "It can also make them much harder to help."}, {"t": "p", "text": "Some children fear being laughed at."}, {"t": "p", "text": "Some fear being seen as weak."}, {"t": "p", "text": "Some simply do not want to become the reason everything changes."}, {"t": "p", "text": "That matters in football more than many adults realise."}, {"t": "p", "text": "A player may never tell a coach that the bibs are a problem because they do not want the session stopped."}, {"t": "p", "text": "They may never say they cannot trust the colours properly because they do not want teammates rolling their eyes."}, {"t": "p", "text": "They may never admit they are unsure who is where because they would rather be shouted at for a bad pass than risk looking like a burden."}, {"t": "p", "text": "That silence can last for years."}, {"t": "p", "text": "And the longer it lasts, the more natural the struggle starts to feel."}, {"t": "p", "text": "Not normal, exactly."}, {"t": "p", "text": "Just permanent."}, {"t": "p", "text": "Like something the player must somehow manage on their own."}, {"t": "p", "text": "There is also the problem of comparison."}, {"t": "p", "text": "Children are often judged against how they seem relative to everyone else."}, {"t": "p", "text": "If the other players cope with the drill, the assumption is that the drill is fine."}, {"t": "p", "text": "If the other children can follow the coloured task at school, the assumption is that the task is clear."}, {"t": "p", "text": "If the instruction made sense to the adult giving it, the assumption is that the information itself was good enough."}, {"t": "p", "text": "This is one of the most common blind spots adults have."}, {"t": "p", "text": "They mistake majority clarity for universal clarity."}, {"t": "p", "text": "But a task being clear to most people does not mean it is clear to everyone."}, {"t": "p", "text": "That is why colour blindness survives so easily inside group settings. The group keeps functioning, so the system assumes the problem must sit inside the individual. The possibility that the environment itself is producing confusion often arrives much later, if it arrives at all."}, {"t": "p", "text": "Parents can miss it for very human reasons too."}, {"t": "p", "text": "Most parents are not taught what childhood colour blindness looks like in real life."}, {"t": "p", "text": "They are not handed a checklist when their child starts school."}, {"t": "p", "text": "They are not routinely told that colour testing may not happen automatically."}, {"t": "p", "text": "They are not usually shown how colour blindness might appear outside obvious colour naming mistakes."}, {"t": "p", "text": "So they interpret what they see through the explanations that are already available to them."}, {"t": "p", "text": "He rushes."}, {"t": "p", "text": "She gets flustered."}, {"t": "p", "text": "He panics."}, {"t": "p", "text": "She needs more confidence."}, {"t": "p", "text": "He loses focus when the pressure rises."}, {"t": "p", "text": "She is bright but inconsistent."}, {"t": "p", "text": "These are not stupid conclusions."}, {"t": "p", "text": "They are incomplete ones."}, {"t": "p", "text": "And because parents often see their child in multiple roles at once, the pattern can blur even further. A child may struggle in football but not complain at home. They may cope in everyday situations but unravel in certain school tasks. They may know the names of colours while still not separating those colours reliably in fast or crowded environments. That mix makes the problem harder to spot without a direct question being asked."}, {"t": "p", "text": "Coaches miss it for their own understandable reasons."}, {"t": "p", "text": "Football is fast."}, {"t": "p", "text": "Sessions are crowded."}, {"t": "p", "text": "Time is limited."}, {"t": "p", "text": "Most coaches are looking at twenty things at once."}, {"t": "p", "text": "Technique."}, {"t": "p", "text": "Speed."}, {"t": "p", "text": "Attitude."}, {"t": "p", "text": "Shape."}, {"t": "p", "text": "Effort."}, {"t": "p", "text": "Communication."}, {"t": "p", "text": "Decision-making."}, {"t": "p", "text": "Intensity."}, {"t": "p", "text": "Standards."}, {"t": "p", "text": "A coach sees the result before they see the invisible chain underneath it."}, {"t": "p", "text": "The player hesitated."}, {"t": "p", "text": "The pass was late."}, {"t": "p", "text": "The runner was missed."}, {"t": "p", "text": "The line was overrun."}, {"t": "p", "text": "The cone was skipped."}, {"t": "p", "text": "The detail of why that happened can easily get swallowed by the speed of the session."}, {"t": "p", "text": "And once a coach has built a first impression of a player, that impression can become hard to shift."}, {"t": "p", "text": "If a player gets labelled as hesitant, nervous, or inconsistent early on, later mistakes are often read through the same lens. The coach starts seeing confirmation, not contradiction. The visual issue stays hidden because the behaviour already seems explained."}, {"t": "p", "text": "That is why naming matters so much."}, {"t": "p", "text": "A named problem changes what adults notice."}, {"t": "p", "text": "Without the name, they see isolated mistakes."}, {"t": "p", "text": "With the name, they start seeing patterns."}, {"t": "p", "text": "The child who only struggles in certain bib colours."}, {"t": "p", "text": "The player whose decision-making drops when kits lose contrast."}, {"t": "p", "text": "The one who seems calmer when the visual setup is simpler."}, {"t": "p", "text": "The one who keeps checking again before releasing the ball."}, {"t": "p", "text": "The one who can play beautifully in one context and awkwardly in another."}, {"t": "p", "text": "The one who never complains, but whose body language changes the moment the colours get worse."}, {"t": "p", "text": "These are not random moments."}, {"t": "p", "text": "They are clues."}, {"t": "p", "text": "But clues only help if somebody knows how to read them."}, {"t": "p", "text": "That is why missed colour blindness is not just a matter of absent testing. It is also a matter of absent language. If adults do not have the words for what they are looking for, they struggle to recognise it even when it is happening right in front of them."}, {"t": "p", "text": "The child cannot explain it."}, {"t": "p", "text": "The parent cannot name it."}, {"t": "p", "text": "The coach does not spot it."}, {"t": "p", "text": "The problem remains active."}, {"t": "p", "text": "And the player starts building a personality around a visual difficulty they never chose."}, {"t": "p", "text": "That is one of the saddest parts of late recognition."}, {"t": "p", "text": "The condition is missed once by the system."}, {"t": "p", "text": "Then missed again by interpretation."}, {"t": "p", "text": "Then missed again by routine."}, {"t": "p", "text": "Then missed again by embarrassment."}, {"t": "p", "text": "Then missed again by success in other settings."}, {"t": "p", "text": "Then missed again by the fact that the child has become good at hiding it."}, {"t": "p", "text": "By the time the truth surfaces, years may already have been shaped by the wrong explanation."}, {"t": "p", "text": "That does not mean adults should feel guilty for every missed sign."}, {"t": "p", "text": "Guilt is not the point."}, {"t": "p", "text": "Awareness is."}, {"t": "p", "text": "This chapter is not here to accuse parents, teachers, or coaches of failing children on purpose. It is here to show how easy it is for the wrong explanation to win if nobody is looking in the right direction."}, {"t": "p", "text": "A child cannot report a difference they assume is normal."}, {"t": "p", "text": "A parent cannot recognise a pattern they have never been taught to notice."}, {"t": "p", "text": "A coach cannot solve a problem they think is something else."}, {"t": "p", "text": "That is why colour blindness gets missed."}, {"t": "p", "text": "Not because nobody cares."}, {"t": "p", "text": "But because caring is not the same as knowing what to look for."}, {"t": "p", "text": "And once you understand that, the next step becomes clearer."}, {"t": "p", "text": "Do not only ask, What mistake did the child make?"}, {"t": "p", "text": "Ask, What information may have been harder for them to trust in that moment?"}, {"t": "p", "text": "Do not only ask, Why do they keep doing this?"}, {"t": "p", "text": "Ask, When does it happen, and when does it not?"}, {"t": "p", "text": "Do not only ask, Why are they inconsistent?"}, {"t": "p", "text": "Ask, What changes in the environment when the inconsistency appears?"}, {"t": "p", "text": "That shift in questioning is the beginning of earlier recognition."}, {"t": "p", "text": "And earlier recognition changes everything."}, {"t": "p", "text": "It reduces shame."}, {"t": "p", "text": "It shortens confusion."}, {"t": "p", "text": "It gives parents a direction."}, {"t": "p", "text": "It gives coaches a better response."}, {"t": "p", "text": "It gives the player something they may never have had before:"}, {"t": "p", "text": "an explanation that is more truthful than blame."}, {"t": "p", "text": "That is why this chapter matters."}, {"t": "p", "text": "Because before support can begin, the silence around the problem has to be broken."}, {"t": "p", "text": "And before the silence can be broken, people have to understand why it lasted so long in the first place."}, {"t": "h2", "text": "Chapter 3 Summary"}, {"t": "p", "text": "Colour blindness is often missed because children usually assume everyone sees what they see."}, {"t": "p", "text": "Many children become good at compensating before anyone realises there is something to compensate for."}, {"t": "p", "text": "Adults often mistake the visible result for the real cause. They see hesitation, inconsistency, wrong choices, or confusion, then explain those things as attitude, concentration, nerves, or low awareness."}, {"t": "p", "text": "The problem can also look inconsistent because it appears more strongly in some colours, drills, lighting conditions, and environments than others."}, {"t": "p", "text": "Routine eye checks do not always pick up colour blindness unless someone specifically looks for it."}, {"t": "p", "text": "Embarrassment, silence, and fear of standing out can stop children from asking for help, especially in football settings."}, {"t": "p", "text": "Colour blindness gets missed not because nobody cares, but because most people are not taught what to look for."}, {"t": "p", "text": "Earlier recognition begins when adults stop asking only what mistake happened and start asking what visual information may have been harder to trust in that moment."}, {"t": "h1", "text": "Chapter 4 - The Hidden Football Struggle", "id": "chapter-4-the-hidden-football-struggle"}, {"t": "p", "text": "Colour blindness becomes much easier to understand once it is placed inside the actual rhythm of football."}, {"t": "p", "text": "Not in theory."}, {"t": "p", "text": "Not in a diagram."}, {"t": "p", "text": "Not in a medical leaflet."}, {"t": "p", "text": "On a pitch."}, {"t": "p", "text": "In movement."}, {"t": "p", "text": "Under pressure."}, {"t": "p", "text": "With players scanning, checking shoulders, receiving on the half-turn, judging distances, tracking runners, reading lines, reacting to colour-coded instructions, and trying to make fast decisions before the space closes."}, {"t": "p", "text": "That is where the hidden football struggle lives."}, {"t": "p", "text": "Because football is not a game of slow visual inspection. It is a game of rapid sorting. Who is mine? Who is theirs? Where is the space? Where is the line? Where is the runner? Where is the safe pass? Where is the danger? What can I trust at first glance, and what do I need to check again?"}, {"t": "p", "text": "For most players, those questions are answered quickly enough that the process feels automatic."}, {"t": "p", "text": "For a colour-blind player, some of that automaticity can disappear."}, {"t": "p", "text": "Not always."}, {"t": "p", "text": "Not in every moment."}, {"t": "p", "text": "But often enough to matter."}, {"t": "p", "text": "That is what makes the struggle so difficult for other people to see. The player is not obviously unable to play. They are not obviously unable to see. They are trying to perform in a game where information arrives fast, overlaps, and changes constantly. If some of the colour-based cues in that information system are unreliable, the player may still cope, but they may cope at a cost."}, {"t": "p", "text": "That cost is rarely announced out loud."}, {"t": "p", "text": "It shows itself in football ways."}, {"t": "p", "text": "A pass delayed."}, {"t": "p", "text": "A runner missed."}, {"t": "p", "text": "A press mistimed."}, {"t": "p", "text": "A channel ignored."}, {"t": "p", "text": "A line overrun."}, {"t": "p", "text": "A training drill that suddenly falls apart when the bibs come out."}, {"t": "p", "text": "A player who looks sharp in one setup and strangely hesitant in another."}, {"t": "p", "text": "To understand the hidden football struggle properly, you have to understand one central truth:"}, {"t": "p", "text": "football uses colour as information all the time."}, {"t": "p", "text": "It uses it in kits."}, {"t": "p", "text": "In bibs."}, {"t": "p", "text": "In cones."}, {"t": "p", "text": "In pitch markings."}, {"t": "p", "text": "In balls."}, {"t": "p", "text": "In tactical boards."}, {"t": "p", "text": "In coach instructions."}, {"t": "p", "text": "In visual habits that players depend on without even realising they depend on them."}, {"t": "p", "text": "That is why colour blindness is not just a side issue in football. It is woven into the visual structure of the game."}, {"t": "p", "text": "Kits are the most obvious place where this becomes visible."}, {"t": "p", "text": "A player looks up and needs to identify a teammate quickly enough to act on instinct. That identification is not usually built on one single clue. It is built on a combination of movement, shape, spacing, pattern, expectation, body position, and colour. But colour often does a huge amount of the work, especially in the first split second."}, {"t": "p", "text": "That is why certain kit combinations are such a problem."}, {"t": "p", "text": "If two teams look clearly different to a coach standing still on the touchline, that does not automatically mean they are easy to tell apart at speed on the pitch. The grass changes the picture. The distance changes the picture. The light changes the picture. The crowd changes the picture. Movement changes the picture. What feels distinct in a static glance can become uncertain in a live decision."}, {"t": "p", "text": "And uncertainty in football is expensive."}, {"t": "p", "text": "A player does not always need perfect certainty to play well."}, {"t": "p", "text": "But they do need enough certainty to act without doubt taking over."}, {"t": "p", "text": "When kit colours collapse together too easily, the player starts looking for backup clues."}, {"t": "p", "text": "Shorts."}, {"t": "p", "text": "Socks."}, {"t": "p", "text": "Patterns."}, {"t": "p", "text": "Body shape."}, {"t": "p", "text": "Boot colour."}, {"t": "p", "text": "Running style."}, {"t": "p", "text": "Position."}, {"t": "p", "text": "All of those things can help."}, {"t": "p", "text": "But none of them is as quick as trusting the first overall visual picture."}, {"t": "p", "text": "That extra searching takes time, even if the time is tiny."}, {"t": "p", "text": "And football punishes tiny delays."}, {"t": "p", "text": "This is why some colour-blind players describe needing one more look before they release the ball. They are not asking the game to slow down. They are trying to catch up with a picture that is less clear for them than it is for everyone else."}, {"t": "p", "text": "That is the first layer of the hidden struggle."}, {"t": "p", "text": "The second layer is that training can be even worse than matches."}, {"t": "p", "text": "Many people assume match day is where the real problem is. Sometimes it is. But training often creates a different kind of visual chaos."}, {"t": "p", "text": "Matches usually involve two team kits and a relatively fixed structure."}, {"t": "p", "text": "Training can involve anything."}, {"t": "p", "text": "Red bibs."}, {"t": "p", "text": "Orange cones."}, {"t": "p", "text": "Yellow flat markers."}, {"t": "p", "text": "White lines."}, {"t": "p", "text": "Coloured poles."}, {"t": "p", "text": "Different balls."}, {"t": "p", "text": "Mini-goals."}, {"t": "p", "text": "Changing teams."}, {"t": "p", "text": "Rotating stations."}, {"t": "p", "text": "Multi-colour practices."}, {"t": "p", "text": "Coach instructions that rely completely on colour language."}, {"t": "p", "text": "To a coach, this may look like organisation."}, {"t": "p", "text": "To a colour-blind player, it can feel like a minefield."}, {"t": "p", "text": "The drill begins, and the player is not only trying to understand the football action. They are also trying to understand which colours matter, which colours can be trusted, and which visual cues are going to"}, {"t": "p", "text": "disappear into the background the second the movement starts."}, {"t": "p", "text": "That is why some players look fine until the session becomes more colour dependent."}, {"t": "p", "text": "Everything is under control while the task is simple."}, {"t": "p", "text": "Then the cones appear."}, {"t": "p", "text": "Then the bib colours change."}, {"t": "p", "text": "Then the drill asks for a pass to a colour-coded zone."}, {"t": "p", "text": "Then two teams are separated by bibs that looked acceptable when handed out but collapse once they are moving across grass in changing light."}, {"t": "p", "text": "And suddenly the player looks hesitant, late, confused, or poor."}, {"t": "p", "text": "From the outside, it may seem as if they have stopped concentrating."}, {"t": "p", "text": "From the inside, the visual job has just become much harder."}, {"t": "p", "text": "This is especially cruel because it often happens in the very environments where improvement is supposed to happen. Training should build confidence, rhythm, and repetition. But if the visual setup itself keeps introducing uncertainty, the player can leave the session with the exact"}, {"t": "p", "text": "opposite feeling. Not sharper. More doubtful. Not more trusting of their game. Less."}, {"t": "p", "text": "Cones are one of the clearest examples of how small choices can create hidden problems."}, {"t": "p", "text": "To many coaches, cones are just cones."}, {"t": "p", "text": "A simple tool."}, {"t": "p", "text": "A cheap tool."}, {"t": "p", "text": "A neutral tool."}, {"t": "p", "text": "But cones are not neutral if they disappear."}, {"t": "p", "text": "A player who cannot pick up a cone quickly enough does not only risk doing the drill badly. They risk looking careless, slow to react, or unable to follow basic instruction. That is a big reputational cost for a small equipment choice."}, {"t": "p", "text": "The same is true of line markings."}, {"t": "p", "text": "A player who slightly overruns a boundary, misjudges where a practice area ends, or runs the ball out when they thought they still had room may be judged as sloppy. But if the line is low-contrast, poorly chosen, or visually weak against the surface, the mistake may have started before the player ever moved."}, {"t": "p", "text": "This is what makes the football struggle so important to explain: many of the visible mistakes are downstream from invisible visual problems."}, {"t": "p", "text": "The same is true of balls."}, {"t": "p", "text": "Most players do not spend much time thinking about ball visibility unless conditions are extreme. But for a colour-blind player, the ball can become part of the same wider issue. Against certain backgrounds or in certain lighting, the ball may not separate cleanly enough from the pitch, the crowd, the advertising, or the clutter around the session. That does not mean the player cannot see the ball at all. It means the quality of pickup can change, and when pickup changes, confidence changes with it."}, {"t": "p", "text": "A player who is half a beat less certain of where the ball is landing, where it is rolling, or how clearly it is arriving is not imagining that discomfort. They are playing a version of the same game with slightly less reliable visual information."}, {"t": "p", "text": "And again, that difference may be tiny."}, {"t": "p", "text": "But tiny differences matter in football."}, {"t": "p", "text": "A metre matters."}, {"t": "p", "text": "A touch matters."}, {"t": "p", "text": "A glance matters."}, {"t": "p", "text": "Half a second matters."}, {"t": "p", "text": "That is why the hidden football struggle rarely looks dramatic enough to receive immediate sympathy. It"}, {"t": "p", "text": "is a game of slight disadvantages creating repeated consequences."}, {"t": "p", "text": "The player is not usually ruined by one single visual problem."}, {"t": "p", "text": "They are worn down by many."}, {"t": "p", "text": "The next piece of the struggle is scanning."}, {"t": "p", "text": "Scanning is one of the great hidden skills in football. Good players do it without making a show of it. They gather information before the ball arrives. They check shoulders. They build a picture early. They decide faster because they have looked sooner."}, {"t": "p", "text": "But scanning only works well if the information being scanned can be sorted quickly enough to use."}, {"t": "p", "text": "If two moving shirts are harder to separate."}, {"t": "p", "text": "If a runner blends too easily into the background."}, {"t": "p", "text": "If the bibs are not giving clean team identity."}, {"t": "p", "text": "If the player has to check again before trusting the first picture."}, {"t": "p", "text": "Then scanning becomes heavier work."}, {"t": "p", "text": "Not useless."}, {"t": "p", "text": "Heavier."}, {"t": "p", "text": "That difference matters because football often praises players for being quick-minded without fully recognising how much that quickness depends on clean perceptual input. Players are told to scan more, scan earlier, scan better. And often that is good coaching. But if the visual scene itself is unreliable, scanning does not remove the problem. It may simply reveal the problem faster."}, {"t": "p", "text": "This is why some colour-blind players end up looking as if they are overthinking. In a sense, they are. But not because they are naturally overcomplicated players. They are overchecking because the information they are supposed to trust at speed is not landing cleanly enough the first time."}, {"t": "p", "text": "That can create a very specific kind of frustration."}, {"t": "p", "text": "The player knows the game."}, {"t": "p", "text": "They see ideas."}, {"t": "p", "text": "They understand movement."}, {"t": "p", "text": "They can read space."}, {"t": "p", "text": "But in certain moments they cannot get from perception to action quickly enough without doubt entering the chain."}, {"t": "p", "text": "And once doubt enters the chain, instinct starts to weaken."}, {"t": "p", "text": "That is part of the hidden football struggle too."}, {"t": "p", "text": "It is not only external confusion."}, {"t": "p", "text": "It is internal hesitation built on repeated visual uncertainty."}, {"t": "p", "text": "Lighting makes all of this worse."}, {"t": "p", "text": "Bright sunlight can flatten some colours."}, {"t": "p", "text": "Shadows can break the pitch into different visual zones."}, {"t": "p", "text": "Floodlights can change how kits separate."}, {"t": "p", "text": "Wet surfaces can reflect more than expected."}, {"t": "p", "text": "Dark evenings can make low-contrast details harder to trust."}, {"t": "p", "text": "That is why the same player can look more confident in one set of conditions and more uneasy in another. The environment is not fixed. The picture changes. Some sessions help the player without meaning to. Others make everything harder without anyone realising why."}, {"t": "p", "text": "That can be deeply disorienting for the player."}, {"t": "p", "text": "If they were always poor in the same obvious way, the problem might be easier to identify. But they are not. They are capable. Then unsure. Then sharp again. Then suddenly hesitant in a different setup. That variation makes the struggle look like mindset when it may actually be environment."}, {"t": "p", "text": "And because football culture often values certainty, toughness, and decisiveness, anything that looks variable can quickly be judged as character weakness."}, {"t": "p", "text": "That is how players get labelled too early."}, {"t": "p", "text": "Inconsistent."}, {"t": "p", "text": "Nervy."}, {"t": "p", "text": "Safe."}, {"t": "p", "text": "Slow on the picture."}, {"t": "p", "text": "Doesn’t release it quick enough."}, {"t": "p", "text": "Overthinks."}, {"t": "p", "text": "Doesn’t trust himself."}, {"t": "p", "text": "These labels may describe what people are seeing."}, {"t": "p", "text": "They do not always describe why they are seeing it."}, {"t": "p", "text": "That is the difference this book keeps trying to protect."}, {"t": "p", "text": "A poor visual environment can manufacture behaviours that look like poor football personality."}, {"t": "p", "text": "That is not a small point."}, {"t": "p", "text": "It can shape who gets trusted."}, {"t": "p", "text": "Who gets selected."}, {"t": "p", "text": "Who gets shouted at."}, {"t": "p", "text": "Who gets believed."}, {"t": "p", "text": "Who gets remembered as talented."}, {"t": "p", "text": "Who gets remembered as unreliable."}, {"t": "p", "text": "The hidden football struggle is therefore not only about comfort. It is about development. If a player repeatedly trains and competes inside setups that keep distorting the information they depend on, their football development is being shaped by something other people may not even know is there."}, {"t": "p", "text": "That has consequences."}, {"t": "p", "text": "A player may avoid risky forward passes because the picture feels unstable."}, {"t": "p", "text": "They may choose safer options and look less ambitious."}, {"t": "p", "text": "They may delay enough to lose the chance to play through pressure."}, {"t": "p", "text": "They may receive with less confidence."}, {"t": "p", "text": "They may begin to fear certain sessions."}, {"t": "p", "text": "They may seem technically weaker than they are because the environment keeps interfering with the timing of their actions."}, {"t": "p", "text": "And because all of this can happen without a dramatic visible cause, the player often ends up carrying the judgment personally."}, {"t": "p", "text": "This is why the struggle has to be translated into concrete football language."}, {"t": "p", "text": "Not abstract pity."}, {"t": "p", "text": "Not a vague awareness message."}, {"t": "p", "text": "Concrete football language."}, {"t": "p", "text": "Kits matter."}, {"t": "p", "text": "Bibs matter."}, {"t": "p", "text": "Cones matter."}, {"t": "p", "text": "Lines matter."}, {"t": "p", "text": "Balls matter."}, {"t": "p", "text": "Scanning matters."}, {"t": "p", "text": "Lighting matters."}, {"t": "p", "text": "Background matters."}, {"t": "p", "text": "Communication matters too."}, {"t": "p", "text": "If a coach says, Pass to red, that instruction assumes red is the clearest useful cue."}, {"t": "p", "text": "It may not be."}, {"t": "p", "text": "If a teammate shouts, Man on, back foot, set, left shoulder, the player is being given football information that works beyond colour."}, {"t": "p", "text": "That distinction matters."}, {"t": "p", "text": "The best support in football often sounds like better football, not special football."}, {"t": "p", "text": "That is one of the most hopeful parts of this whole chapter."}, {"t": "p", "text": "Many of the changes that help colour-blind players are not awkward, expensive, or disruptive. They are often signs of better visual organisation and clearer coaching. Better contrast helps everyone. Better cueing helps everyone. Simpler visual setups help everyone. Smarter communication helps everyone."}, {"t": "p", "text": "That means the hidden football struggle is not only a problem to expose. It is also an opportunity to improve the environment for the whole group."}, {"t": "p", "text": "But that opportunity is wasted if adults keep treating colour blindness as a niche fan-visibility issue or a minor side note in kit design."}, {"t": "p", "text": "For the player on the pitch, this is much closer to the centre of the game."}, {"t": "p", "text": "Because the centre of the game is decision-making."}, {"t": "p", "text": "And decision-making begins with what the player can sort, trust, and act on quickly enough."}, {"t": "p", "text": "That is why the hidden football struggle deserves to be named plainly."}, {"t": "p", "text": "It is the struggle of playing a fast visual game with visual information that is not always fast for you."}, {"t": "p", "text": "It is the struggle of needing certainty in a sport that punishes hesitation."}, {"t": "p", "text": "It is the struggle of appearing inconsistent when the environment itself is inconsistent for your eyes."}, {"t": "p", "text": "It is the struggle of knowing you can play, while repeatedly entering moments that make you look like you cannot."}, {"t": "p", "text": "And it is the struggle of carrying all of that inside a culture that often judges the visible outcome much faster than it investigates the invisible cause."}, {"t": "p", "text": "Once that is understood, a lot of football moments start making more sense."}, {"t": "p", "text": "The bad session that arrived with the wrong bib colours."}, {"t": "p", "text": "The player who suddenly looked lost when cones and markers multiplied."}, {"t": "p", "text": "The strange contrast between training alone and training in a crowded colour-based environment."}, {"t": "p", "text": "The wrong pass that came after one extra check."}, {"t": "p", "text": "The loss of confidence that seemed to grow for no obvious reason."}, {"t": "p", "text": "The coach’s frustration."}, {"t": "p", "text": "The parent’s confusion."}, {"t": "p", "text": "The play
