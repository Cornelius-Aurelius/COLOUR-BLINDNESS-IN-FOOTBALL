", "text": "That honesty may include frustration."}, {"t": "p", "text": "It may include grief."}, {"t": "p", "text": "But it also includes strategy."}, {"t": "p", "text": "I know what makes things harder."}, {"t": "p", "text": "I know what helps."}, {"t": "p", "text": "I know which situations I need to prepare for."}, {"t": "p", "text": "I know how to explain some of this now."}, {"t": "p", "text": "I know that difficulty is not the same as limitation of worth."}, {"t": "p", "text": "That is a far stronger base for growth."}, {"t": "p", "text": "Another change awareness can bring is compassion."}, {"t": "p", "text": "Not pity."}, {"t": "p", "text": "Compassion."}, {"t": "p", "text": "The player may begin judging themselves less harshly."}, {"t": "p", "text": "The parent may begin looking back with more tenderness."}, {"t": "p", "text": "The coach may begin seeing players more carefully."}, {"t": "p", "text": "And sometimes, perhaps surprisingly, the player becomes more compassionate toward other people too."}, {"t": "p", "text": "Once you have lived through years of being misunderstood for something hidden, you often become slower to laugh at other people’s hidden struggles."}, {"t": "p", "text": "That is a strength worth naming."}, {"t": "p", "text": "Awareness can bring that strength into the open."}, {"t": "p", "text": "It can also change how the whole team environment feels when handled well."}, {"t": "p", "text": "If the coach responds properly, the team may become stronger in communication, clearer in support, and smarter in setup. That does not only help the colour-blind player. It helps everyone. Better football often grows from better understanding, not just harder shouting."}, {"t": "p", "text": "This is worth saying clearly because some adults worry that awareness will make the environment too delicate."}, {"t": "p", "text": "The opposite is often true."}, {"t": "p", "text": "Handled well, awareness makes the environment more intelligent."}, {"t": "p", "text": "More intentional."}, {"t": "p", "text": "More honest."}, {"t": "p", "text": "More demanding in the right places instead of the wrong ones."}, {"t": "p", "text": "That is the sort of change serious football should welcome."}, {"t": "p", "text": "Still, there are difficult parts."}, {"t": "p", "text": "A player may go through an angry phase after awareness."}, {"t": "p", "text": "Why did nobody notice sooner?"}, {"t": "p", "text": "Why did I spend so long blaming myself?"}, {"t": "p", "text": "Why did certain adults keep making me feel worse?"}, {"t": "p", "text": "That anger is understandable."}, {"t": "p", "text": "It does not need to be fed endlessly."}, {"t": "p", "text": "But it does need to be respected."}, {"t": "p", "text": "Because anger is often grief with sharper edges."}, {"t": "p", "text": "It tells you something mattered."}, {"t": "p", "text": "It tells you something was lost."}, {"t": "p", "text": "It tells you the player is starting to grasp how unfair some of those years really were."}, {"t": "p", "text": "That is part of awareness too."}, {"t": "p", "text": "Not just the useful tools."}, {"t": "p", "text": "The emotional reckoning."}, {"t": "p", "text": "And that reckoning can still lead somewhere good."}, {"t": "p", "text": "Not because the past becomes fine."}, {"t": "p", "text": "Because the future no longer has to be built on the same misunderstanding."}, {"t": "p", "text": "That is what changes after awareness more than anything else:"}, {"t": "p", "text": "the future becomes more truthful."}, {"t": "p", "text": "The player’s struggles are seen more accurately."}, {"t": "p", "text": "The parent’s support becomes more precise."}, {"t": "p", "text": "The coach’s response becomes more intelligent."}, {"t": "p", "text": "The team’s communication can improve."}, {"t": "p", "text": "The child’s identity no longer has to grow only around blame."}, {"t": "p", "text": "That does not make colour blindness disappear."}, {"t": "p", "text": "It makes life around it more workable."}, {"t": "p", "text": "More dignified."}, {"t": "p", "text": "More honest."}, {"t": "p", "text": "And that honesty is powerful."}, {"t": "p", "text": "Because football often hurts players most when it tells them lies about who they are."}, {"t": "p", "text": "Awareness interrupts those lies."}, {"t": "p", "text": "You are not lazy."}, {"t": "p", "text": "You are not weak."}, {"t": "p", "text": "You are not stupid."}, {"t": "p", "text": "You are not imagining it."}, {"t": "p", "text": "You are not the only one."}, {"t": "p", "text": "Some parts of the visual picture have been harder for you to trust, and now that truth has a name."}, {"t": "p", "text": "That name can now be used well."}, {"t": "p", "text": "Not as a cage."}, {"t": "p", "text": "As a key."}, {"t": "p", "text": "A key to better conversations."}, {"t": "p", "text": "Better coaching."}, {"t": "p", "text": "Better preparation."}, {"t": "p", "text": "Better self-respect."}, {"t": "p", "text": "Better recovery after bad moments."}, {"t": "p", "text": "Better understanding of what helps and what hurts."}, {"t": "p", "text": "This is why awareness is such a turning point."}, {"t": "p", "text": "It does not solve everything."}, {"t": "p", "text": "But it changes the direction of everything."}, {"t": "p", "text": "And direction matters."}, {"t": "p", "text": "Especially for children and players who have already spent too long walking under the wrong explanation."}, {"t": "h2", "text": "Chapter 11 Summary"}, {"t": "p", "text": "Awareness does not change everything instantly, but it changes meaning."}, {"t": "p", "text": "It replaces confusion with truth and gives players, parents, and coaches a more accurate explanation for what has been happening."}, {"t": "p", "text": "Awareness often brings both relief and grief: relief that the struggle finally has a name, and grief for the years shaped by the wrong explanation."}, {"t": "p", "text": "One of the first big changes after awareness is pattern recognition. Difficult moments stop feeling random and start making more sense."}, {"t": "p", "text": "Players can begin preparing for triggers instead of only reacting to them."}, {"t": "p", "text": "Parents can stop guessing and start asking better questions."}, {"t": "p", "text": "Coaches can stop coaching every symptom as if it comes from the same place."}, {"t": "p", "text": "Awareness does not erase hesitation, old habits, or damaged confidence overnight, but it creates the conditions for trust, dignity, and better support to rebuild."}, {"t": "p", "text": "Some changes after awareness are practical, some are emotional, and some are relational."}, {"t": "p", "text": "Most importantly, awareness changes the future. The player no longer has to grow inside a story built only on blame."}, {"t": "h1", "text": "Chapter 12 - Myths, Resources, and the Future of the Game", "id": "chapter-12-myths-resources-and-the-future-of-the-game"}, {"t": "p", "text": "By the time most people reach this point in the book, they are carrying two things at once."}, {"t": "p", "text": "More clarity."}, {"t": "p", "text": "And more responsibility."}, {"t": "p", "text": "Clarity, because the hidden problem now makes more sense."}, {"t": "p", "text": "Responsibility, because once you understand the problem properly, it becomes harder to ignore the ways football still gets it wrong."}, {"t": "p", "text": "That is why this final chapter matters."}, {"t": "p", "text": "It brings together three things that must stay together if the book is going to leave the reader in the right place:"}, {"t": "p", "text": "truth,"}, {"t": "p", "text": "tools,"}, {"t": "p", "text": "and hope."}, {"t": "p", "text": "Truth, because colour blindness has been misunderstood for too long."}, {"t": "p", "text": "Tools, because awareness without action is not enough."}, {"t": "p", "text": "Hope, because the point of this book was never to leave the reader sad, guilty, or overwhelmed. The point was to help them see the problem clearly enough to do something useful with it."}, {"t": "p", "text": "The first part of that work is clearing away myths."}, {"t": "p", "text": "Myths are dangerous because they make real problems harder to recognise and harder to solve. A bad myth does not only make people wrong. It makes them confidently wrong. And confident misunderstanding can do a lot of damage."}, {"t": "p", "text": "The most common myth is still the oldest one."}, {"t": "p", "text": "Colour-blind people see only in black and white."}, {"t": "p", "text": "For most people, that is not true."}, {"t": "p", "text": "Most colour-blind players are not looking at a grey world with no colour in it at all. They are dealing with a world where some colours, shades, and visual contrasts do not separate cleanly enough in certain situations. That may sound like a smaller problem than the black-and-white myth suggests. In football, it is often a more important problem. Because football does not only ask, Can you see something eventually? It asks, Can you sort it quickly enough to act with confidence under pressure?"}, {"t": "p", "text": "That is the real issue."}, {"t": "p", "text": "Another myth is that colour blindness is only a tiny inconvenience."}, {"t": "p", "text": "A few crayons."}, {"t": "p", "text": "A few traffic lights."}, {"t": "p", "text": "A few jokes about socks."}, {"t": "p", "text": "Nothing serious."}, {"t": "p", "text": "That myth sounds harmless until you place it inside the life of a child who keeps getting publicly corrected for visual mistakes they do not understand, or inside the life of a player who keeps being blamed for hesitation, inconsistency, or bad decisions when the visual information was never as clear for them as everyone assumed."}, {"t": "p", "text": "Small to one person can be heavy to another."}, {"t": "p", "text": "That is why the words only and just do so much damage here."}, {"t": "p", "text": "It is just colour."}, {"t": "p", "text": "It is only bibs."}, {"t": "p", "text": "It is just a training drill."}, {"t": "p", "text": "It is only one mistake."}, {"t": "p", "text": "The problem is rarely one thing on its own."}, {"t": "p", "text": "The problem is repetition."}, {"t": "p", "text": "Repeated uncertainty."}, {"t": "p", "text": "Repeated embarrassment."}, {"t": "p", "text": "Repeated misreading."}, {"t": "p", "text": "Repeated environments that ask the player to solve a visual problem at speed and then blame them when the solution arrives too late."}, {"t": "p", "text": "That is not tiny."}, {"t": "p", "text": "Another myth is that colour blindness means low football intelligence."}, {"t": "p", "text": "This one is especially cruel because it often arrives disguised as football honesty."}, {"t": "p", "text": "He just does not see the game quickly enough."}, {"t": "p", "text": "She does not read it well enough."}, {"t": "p", "text": "He is not sharp enough mentally."}, {"t": "p", "text": "Sometimes those judgments are true in football for reasons that have nothing to do with colour vision. But sometimes they are hiding a much more specific reality: the player is trying to read a visual scene that is less reliable for them than it is for other players. That is not the same thing as low intelligence."}, {"t": "p", "text": "A player can understand the game and still struggle to trust certain visual cues inside it."}, {"t": "p", "text": "A player can love the game, study the game, think the game well, and still hesitate when colours collapse at speed."}, {"t": "p", "text": "That distinction matters because intelligence should never be judged through a visual barrier nobody has bothered to name."}, {"t": "p", "text": "There is also the myth that trying harder should solve it."}, {"t": "p", "text": "Concentrate more."}, {"t": "p", "text": "Look harder."}, {"t": "p", "text": "Wake up."}, {"t": "p", "text": "Those phrases assume that effort can fix unreliable information."}, {"t": "p", "text": "Sometimes effort helps a player compensate."}, {"t": "p", "text": "It does not make the original problem disappear."}, {"t": "p", "text": "In fact, extra effort is often part of the hidden cost. The player may already be concentrating harder than everyone thinks. They may already be looking twice, checking again, and using more mental energy than the moment should need. The fact that the struggle is still visible does not prove laziness. It may prove the opposite."}, {"t": "p", "text": "Another damaging myth is that all colour-blind people see the same way."}, {"t": "p", "text": "They do not."}, {"t": "p", "text": "Some struggle more with certain colours than others."}, {"t": "p", "text": "Some cope much better in one light than another."}, {"t": "p", "text": "Some can handle one kind of kit but struggle badly with another."}, {"t": "p", "text": "Some are affected more in training than in matches."}, {"t": "p", "text": "Some are also dealing with other visual issues."}, {"t": "p", "text": "Some are not."}, {"t": "p", "text": "This variation matters because one-size-fits-all thinking often produces lazy support. If adults treat every colour-blind player as identical, they stop paying attention to the actual player in front of them."}, {"t": "p", "text": "That is always a mistake."}, {"t": "p", "text": "Then there is the myth that if a referee, coach, or parent thinks the colours look fine, they are fine."}, {"t": "p", "text": "That is not how this works."}, {"t": "p", "text": "Normal vision is not a reliable test for colour-blind accessibility."}, {"t": "p", "text": "A setup can look clear to one person and still create real confusion for another. That is why the best question is not, Does this look fine to me? It is, Does this create the clearest possible picture for the people using it at speed?"}, {"t": "p", "text": "That is a better question in football and a better question in life."}, {"t": "p", "text": "Another myth worth clearing away is the idea that asking for better support means asking for special treatment."}, {"t": "p", "text": "It does not."}, {"t": "p", "text": "Not when the support is sensible."}, {"t": "p", "text": "Not when the support improves clarity rather than lowering challenge."}, {"t": "p", "text": "Not when the support helps the team communicate and organise itself better."}, {"t": "p", "text": "A player asking for clearer bibs, better contrast, earlier communication, or less colour-only instruction is not asking the game to become soft. They are asking the game to become fairer."}, {"t": "p", "text": "That difference matters, especially in football cultures that pride themselves on toughness."}, {"t": "p", "text": "Real toughness is not pretending a hidden barrier is not there."}, {"t": "p", "text": "Real toughness is facing reality clearly and then responding to it intelligently."}, {"t": "p", "text": "There is also a myth around cures."}, {"t": "p", "text": "People love the idea of a neat fix."}, {"t": "p", "text": "A product."}, {"t": "p", "text": "A shortcut."}, {"t": "p", "text": "A device that solves everything."}, {"t": "p", "text": "That desire is understandable. It is also where many people get misled."}, {"t": "p", "text": "No single purchase removes the whole reality of colour blindness from football. Some things may help some people in some situations. Some people find certain strategies, lenses, or visual habits useful. But the most powerful support in football usually comes from understanding, better setup, better communication, and better adaptation, not magical thinking."}, {"t": "p", "text": "That truth may sound less exciting than a miracle fix."}, {"t": "p", "text": "It is also more honest."}, {"t": "p", "text": "And honesty is what protects trust."}, {"t": "p", "text": "Another myth, quieter but just as harmful, is that if a player has reached a decent level already, colour blindness cannot have affected them much."}, {"t": "p", "text": "That is wrong."}, {"t": "p", "text": "A player can succeed and still pay a hidden cost."}, {"t": "p", "text": "A player can cope and still be drained."}, {"t": "p", "text": "A player can adapt and still have lost confidence, freedom, or trust along the way."}, {"t": "p", "text": "Reaching a certain level does not prove the journey was fair."}, {"t": "p", "text": "It may simply prove the player was talented and determined enough to survive the unfairness longer than most."}, {"t": "p", "text": "That is why this book has never tried to reduce the issue to who makes it and who does not."}, {"t": "p", "text": "The deeper question is more human:"}, {"t": "p", "text": "How many years of confusion, shame, and avoidable struggle are we willing to accept before football decides to see the problem properly?"}, {"t": "p", "text": "That question leads naturally into resources."}, {"t": "p", "text": "Because once myths are cleared away, the next responsibility is practical."}, {"t": "p", "text": "What should people do?"}, {"t": "p", "text": "The answer depends on who is reading."}, {"t": "p", "text": "If you are a player, your most useful resources begin with self-understanding."}, {"t": "p", "text": "Know your triggers."}, {"t": "p", "text": "Know the colours and conditions that make the picture harder for you to trust."}, {"t": "p", "text": "Know which anchors help most."}, {"t": "p", "text": "Know the kind of communication that reduces confusion early."}, {"t": "p", "text": "Know that self-advocacy is a football skill, not a weakness."}, {"t": "p", "text": "And know that you do not need to explain yourself apologetically in order to deserve clarity."}, {"t": "p", "text": "If you are a parent, your resources begin with observation and action."}, {"t": "p", "text": "Watch for patterns, not isolated moments."}, {"t": "p", "text": "Write things down if you need to."}, {"t": "p", "text": "Notice which environments make the struggle worse."}, {"t": "p", "text": "Ask better questions."}, {"t": "p", "text": "Seek proper colour-vision testing rather than assuming it would automatically have been covered."}, {"t": "p", "text": "Speak to your child in a way that reduces shame instead of increasing it."}, {"t": "p", "text": "Speak to coaches with calm specifics, not panic."}, {"t": "p", "text": "Protect the child’s dignity while still moving toward understanding."}, {"t": "p", "text": "If you are a coach, your resources begin with design."}, {"t": "p", "text": "Your session design."}, {"t": "p", "text": "Your equipment choices."}, {"t": "p", "text": "Your language."}, {"t": "p", "text": "Your default habits."}, {"t": "p", "text": "Your willingness to ask whether the environment may be distorting what you think you are seeing."}, {"t": "p", "text": "Your standards around team communication."}, {"t": "p", "text": "Your ability to keep the football demand high while stripping away avoidable visual waste."}, {"t": "p", "text": "The strongest resource many coaches can build is not a separate file in a drawer."}, {"t": "p", "text": "It is a habit of intentional clarity."}, {"t": "p", "text": "That habit helps the whole team."}, {"t": "p", "text": "At a club level, resources should become systems."}, {"t": "p", "text": "A club does not need to wait for a dramatic crisis before acting. It can create better defaults now."}, {"t": "p", "text": "Better training equipment choices."}, {"t": "p", "text": "Better awareness among coaches."}, {"t": "p", "text": "Better ways of handling disclosure confidentially and respectfully."}, {"t": "p", "text": "Better thinking around kit contrast."}, {"t": "p", "text": "Better communication standards."}, {"t": "p", "text": "Better recognition that colour should not be the only signal carrying important information."}, {"t": "p", "text": "This is how the issue moves from being a private struggle carried by one player to being part of a smarter football environment."}, {"t": "p", "text": "Schools matter too."}, {"t": "p", "text": "So do families."}, {"t": "p", "text": "So do the adults who buy the kit, choose the cones, run the sessions, and control the emotional tone around mistakes."}, {"t": "p", "text": "That is another reason resources matter: they turn concern into structure."}, {"t": "p", "text": "Structure is what prevents the whole issue from depending on luck."}, {"t": "p", "text": "The lucky child gets a coach who happens to notice."}, {"t": "p", "text": "The lucky player lands in a team with a clearer kit."}, {"t": "p", "text": "The lucky parent joins the dots early."}, {"t": "p", "text": "But football should not leave this to luck."}, {"t": "p", "text": "That is where the future of the game enters the conversation."}, {"t": "p", "text": "The future of the game is not only about tactics, data, physical preparation, or academy systems."}, {"t": "p", "text": "It is also about whether football becomes more honest about the environments it creates."}, {"t": "p", "text": "Every era of sport eventually has to face a simple question:"}, {"t": "p", "text": "What barriers have we been normalising without thinking hard enough about them?"}, {"t": "p", "text": "Colour blindness belongs in that question."}, {"t": "p", "text": "Not because it is the biggest issue in football."}, {"t": "p", "text": "Because it is one of the clearest examples of a real, common, often hidden problem that can be made better through better awareness and better design."}, {"t": "p", "text": "And when a sport can make something better without damaging competition, it should."}, {"t": "p", "text": "That is the standard."}, {"t": "p", "text": "Not perfection."}, {"t": "p", "text": "Responsibility."}, {"t": "p", "text": "A better future for the game would look like this:"}, {"t": "p", "text": "Children are tested sooner."}, {"t": "p", "text": "Parents recognise the signs earlier."}, {"t": "p", "text": "Coaches are trained to think beyond colour-only instruction."}, {"t": "p", "text": "Teams use clearer defaults without being forced into embarrassment first."}, {"t": "p", "text": "Players can speak honestly about what helps them without being seen as weak."}, {"t": "p", "text": "Clubs treat visual clarity as part of good football practice rather than a niche afterthought."}, {"t": "p", "text": "And colour-blind players no longer have to spend years deciding whether silence is less painful than misunderstanding."}, {"t": "p", "text": "That future is not unrealistic."}, {"t": "p", "text": "Most of it does not require huge money."}, {"t": "p", "text": "Most of it requires better habits."}, {"t": "p", "text": "Better questions."}, {"t": "p", "text": "Better attention."}, {"t": "p", "text": "Better defaults."}, {"t": "p", "text": "And better respect."}, {"t": "p", "text": "Respect matters here more than it may first seem."}, {"t": "p", "text": "Because at the heart of this whole book has always been one deeper issue: dignity."}, {"t": "p", "text": "The dignity of the child who did not know why they kept getting things wrong."}, {"t": "p", "text": "The dignity of the player who was judged for moments they could not yet explain."}, {"t": "p", "text": "The dignity of the parent who sensed something was off and did not want to fail their child by guessing badly."}, {"t": "p", "text": "The dignity of the coach who wants to help honestly rather than simply shouting harder at a problem they do not understand."}, {"t": "p", "text": "When myths are cleared away, dignity has more room to breathe."}, {"t": "p", "text": "When resources become available, dignity becomes easier to protect."}, {"t": "p", "text": "When the game improves its awareness, dignity becomes less dependent on luck."}, {"t": "p", "text": "That is why this final chapter does not end in anger, even though there are things to be angry about."}, {"t": "p", "text": "It ends in responsibility."}, {"t": "p", "text": "Because responsibility is stronger."}, {"t": "p", "text": "Anger can name the injustice."}, {"t": "p", "text": "Responsibility can change the future."}, {"t": "p", "text": "And football is always being shaped by what people choose to normalise."}, {"t": "p", "text": "For a long time, one version of normal has been this:"}, {"t": "p", "text": "The player struggles."}, {"t": "p", "text": "The adults guess."}, {"t": "p", "text": "The child absorbs the blame."}, {"t": "p", "text": "The environment stays the same."}, {"t": "p", "text": "This book has been arguing for a different normal."}, {"t": "p", "text": "The player struggles."}, {"t": "p", "text": "The adults notice patterns."}, {"t": "p", "text": "The child is protected from false self-blame."}, {"t": "p", "text": "The environment gets smarter."}, {"t": "p", "text": "The game becomes clearer."}, {"t": "p", "text": "That is a better future."}, {"t": "p", "text": "Not because it removes difficulty from football."}, {"t": "p", "text": "Because it removes needless confusion that was never proving anything useful in the first place."}, {"t": "p", "text": "That future will not arrive all at once."}, {"t": "p", "text": "But it can begin in very small ways."}, {"t": "p", "text": "A parent asking one better question."}, {"t": "p", "text": "A coach changing one set of bibs."}, {"t": "p", "text": "A player naming one pattern."}, {"t": "p", "text": "A club changing one default."}, {"t": "p", "text": "A family deciding not to laugh off the same signs again."}, {"t": "p", "text": "A child finally being told, with calm honesty, that what has felt harder may have a real reason behind it."}, {"t": "p", "text": "Small changes matter because hidden problems often survive through small neglect."}, {"t": "p", "text": "The same is true in reverse."}, {"t": "p", "text": "They begin to weaken through small honesty."}, {"t": "p", "text": "And once honesty enters the room, so does possibility."}, {"t": "p", "text": "Possibility that the next child will be seen sooner."}, {"t": "p", "text": "Possibility that the next player will not build their whole identity around avoidable confusion."}, {"t": "p", "text": "Possibility that the next coach will recognise the pattern before frustration hardens into judgment."}, {"t": "p", "text": "Possibility that football will become better not by becoming softer, but by becoming clearer, fairer, and more intelligent."}, {"t": "p", "text": "That is the future worth working toward."}, {"t": "p", "text": "And it begins with something simpler than most people think."}, {"t": "p", "text": "Not a perfect answer."}, {"t": "p", "text": "A better question."}, {"t": "p", "text": "What if the problem is not only the player?"}, {"t": "p", "text": "Once football asks that question seriously, the game can start changing in all the right ways."}, {"t": "h2", "text": "Chapter 12 Summary"}, {"t": "p", "text": "Myths make colour blindness harder to recognise and harder to support well."}, {"t": "p", "text": "The most damaging myths are that colour-blind people see only in black and white, that the problem is only minor, that it means low intelligence, that trying harder should fix it, that all colour-blind people see the same way, and that support means special treatment."}, {"t": "p", "text": "The truth is more useful than the myths. Colour blindness is varied, real, often hidden, and often more costly in football than people realise."}, {"t": "p", "text": "Resources begin with better questions and better habits."}, {"t": "p", "text": "Players need self-understanding, anchors, and self-advocacy."}, {"t": "p", "text": "Parents need observation, calm action, and better conversations."}, {"t": "p", "text": "Coaches need clearer design, clearer communication, and better visual defaults."}, {"t": "p", "text": "Clubs and schools need smarter systems, not just good intentions."}, {"t": "p", "text": "The future of the game depends on whether football becomes more honest about avoidable visual barriers and more willing to remove them."}, {"t": "p", "text": "The goal is not to make football softer. The goal is to make it clearer, fairer, and more intelligent."}, {"t": "p", "text": "The next child should not lose years to a problem that could have been seen sooner."}, {"t": "h1", "text": "Glossary", "id": "glossary"}, {"t": "h2", "text": "Colour blindness / colour vision deficiency (CVD)"}, {"t": "p", "text": "A difference in how a person sees certain colours or colour combinations. Most people with colour blindness do not see only in black and white."}, {"t": "h2", "text": "Red-green colour blindness"}, {"t": "p", "text": "The most common type of colour blindness. It affects how easily certain reds, greens, browns, oranges, and similar shades can be told apart."}, {"t": "h2", "text": "Blue-yellow colour blindness"}, {"t": "p", "text": "A rarer type of colour blindness that affects how some blues and yellows are separated."}, {"t": "h2", "text": "Achromatopsia"}, {"t": "p", "text": "A very rare condition involving much more severe colour-vision loss and often other visual difficulties such as light sensitivity and reduced sharpness of vision."}, {"t": "h2", "text": "Hue"}, {"t": "p", "text": "The colour family something belongs to, such as red, blue, green, or yellow."}, {"t": "h2", "text": "Tone"}, {"t": "p", "text": "How light or dark something appears. In football, tone often matters just as much as colour."}, {"t": "h2", "text": "Contrast"}, {"t": "p", "text": "The visual difference between two things. Strong contrast makes things easier to separate quickly."}, {"t": "h2", "text": "Tonal contrast"}, {"t": "p", "text": "The difference in lightness and darkness between two things. This is often more useful than colour names alone."}, {"t": "h2", "text": "Kit clash"}, {"t": "p", "text": "A situation where two teams’ kits are too hard to tell apart clearly enough."}, {"t": "h2", "text": "Bibs"}, {"t": "p", "text": "Training tops worn over kits to separate teams in practice."}, {"t": "h2", "text": "Cones"}, {"t": "p", "text": "Markers used to create areas, gates, channels, and practice shapes."}, {"t": "h2", "text": "Line markings"}, {"t": "p", "text": "The painted or marked boundaries and zones on the pitch."}, {"t": "h2", "text": "Visual clutter"}, {"t": "p", "text": "Too many competing visual cues at once, making the important information harder to trust quickly."}, {"t": "h2", "text": "Scanning"}, {"t": "p", "text": "Looking around before receiving or acting so the player can build a picture of what is happening."}, {"t": "h2", "text": "Peripheral vision"}, {"t": "p", "text": "What a player sees outside the centre of their gaze."}, {"t": "h2", "text": "Split-second problem"}, {"t": "p", "text": "The extra delay or uncertainty that can happen when a player needs one more check before trusting what they are seeing."}, {"t": "h2", "text": "Micro-hesitation"}, {"t": "p", "text": "A brief moment of delay caused by uncertainty. In football, even a very small hesitation can change the outcome of a decision."}, {"t": "h2", "text": "Anchor"}, {"t": "p", "text": "A cue the player can trust when colour alone is not enough, such as socks, shorts, numbers, movement, voice, or position."}, {"t": "h2", "text": "Self-advocacy"}, {"t": "p", "text": "Explaining what helps you perform better without shame, apology, or excuses."}, {"t": "h2", "text": "Quiet adaptation"}, {"t": "p", "text": "A change that improves clarity and support without singling the player out publicly."}, {"t": "h2", "text": "Flow"}, {"t": "p", "text": "A state where football feels natural, automatic, and trusted rather than crowded by doubt."}, {"t": "h2", "text": "Visual uncertainty"}, {"t": "p", "text": "The feeling that the picture is not clear enough to trust quickly."}, {"t": "h2", "text": "Environmental barrier"}, {"t": "p", "text": "A problem created by the setup around the player rather than by the player’s effort or character."}, {"t": "h2", "text": "Identity damage"}, {"t": "p", "text": "The emotional harm that happens when repeated misunderstanding begins shaping how a child or player sees themselves."}, {"t": "h2", "text": "Confidence rebuild"}, {"t": "p", "text": "The gradual process of restoring trust, calm, and self-belief after repeated difficult experiences."}, {"t": "h2", "text": "Greyscale phone test"}, {"t": "p", "text": "A simple way of checking whether two colours still separate clearly when colour is taken away and only light-dark contrast remains."}, {"t": "h1", "text": "Printable Checklists Index", "id": "printable-checklists-index"}, {"t": "p", "text": "The pages that follow are designed to be used, revisited, and shared when needed."}, {"t": "p", "text": "Inside this section you will find:"}, {"t": "h1", "text": "Parent Signs Checklist", "id": "parent-signs-checklist"}, {"t": "h1", "text": "Parent Next Steps Checklist", "id": "parent-next-steps-checklist"}, {"t": "h1", "text": "Coach Session Clarity Checklist", "id": "coach-session-clarity-checklist"}, {"t": "h1", "text": "Coach Match-Day Clarity Checklist", "id": "coach-match-day-clarity-checklist"}, {"t": "h1", "text": "Player Match-Day Checklist", "id": "player-match-day-checklist"}, {"t": "h1", "text": "Player Training Checklist", "id": "player-training-checklist"}, {"t": "h1", "text": "Player In-The-Moment Reset", "id": "player-in-the-moment-reset"}, {"t": "h1", "text": "Player Self-Advocacy Scripts", "id": "player-self-advocacy-scripts"}, {"t": "h1", "text": "Parent-to-Coach Script", "id": "parent-to-coach-script"}, {"t": "h1", "text": "Greyscale Phone Test", "id": "greyscale-phone-test"}, {"t": "h1", "text": "Equipment Colour Matrix", "id": "equipment-colour-matrix"}, {"t": "h1", "text": "Club Colour Clarity Policy Starter", "id": "club-colour-clarity-policy-starter"}, {"t": "p", "text": "These pages are not a substitute for proper testing or professional advice, but they can help turn awareness into action."}, {"t": "h1", "text": "Parent Signs Checklist", "id": "parent-signs-checklist-2"}, {"t": "p", "text": "Use this checklist if you suspect a child may be colour blind."}, {"t": "h2", "text": "At home"}, {"t": "p", "text": "The child mismatches socks and genuinely thinks they match."}, {"t": "p", "text": "The child chooses the wrong tie, coat, or clothing colour without realising."}, {"t": "p", "text": "The child is corrected often for colour choices that looked right to them."}, {"t": "p", "text": "The child avoids some colour-based activities or looks unusually unsure around them."}, {"t": "p", "text": "The child says something “looks the same” when others think the difference is obvious."}, {"t": "h2", "text": "At school"}, {"t": "p", "text": "The child struggles with colour-coded tasks, charts, maps, folders, or worksheets."}, {"t": "p", "text": "The child looks slower or less confident when colour is carrying the main instruction."}, {"t": "p", "text": "The child copies what others do rather than acting with confidence."}, {"t": "p", "text": "The child seems fine in many tasks but repeatedly struggles when colour becomes important."}, {"t": "h2", "text": "In football"}, {"t": "p", "text": "The child looks much worse in some bib or kit colours than in others."}, {"t": "p", "text": "The child hesitates more when the visual scene is crowded or moving fast."}, {"t": "p", "text": "The child passes late, holds the ball too long, or looks unsure in colour-heavy drills."}, {"t": "p", "text": "The child misses cones, lines, or gates that seem obvious to others."}, {"t": "p", "text": "The child seems much better when training is visually simpler."}, {"t": "p", "text": "The child becomes embarrassed, quiet, or frustrated when colours become part of the task."}, {"t": "p", "text": "If several of these signs repeat, colour blindness is worth exploring properly."}, {"t": "h1", "text": "Parent Next Steps Checklist", "id": "parent-next-steps-checklist-2"}, {"t": "p", "text": "If you suspect colour blindness may be part of the picture, do the following."}, {"t": "p", "text": "Notice patterns, not isolated moments."}, {"t": "p", "text": "Write down which colours, drills, lights, or situations seem hardest."}, {"t": "p", "text": "Ask specifically about colour vision rather than assuming it would already have been checked."}, {"t": "p", "text": "Speak to the child calmly and without shame."}, {"t": "p", "text": "Use language that explains rather than alarms."}, {"t": "p", "text": "Talk to coaches in a practical, respectful way."}, {"t": "p", "text": "Protect the child’s dignity and avoid public discussions that single them out."}, {"t": "p", "text": "Watch what changes when the visual setup improves."}, {"t": "p", "text": "Keep the focus on clarity, not blame."}, {"t": "p", "text": "Remind the child that difficulty is not the same as weakness."}, {"t": "p", "text": "The goal is not panic."}, {"t": "p", "text": "The goal is earlier truth, better support, and less unnecessary self-blame."}, {"t": "h1", "text": "Coach Session Clarity Checklist", "id": "coach-session-clarity-checklist-2"}, {"t": "p", "text": "Before training starts, ask yourself: Can the two groups be told apart quickly and clearly?"}, {"t": "p", "text": "Are the bib colours strong enough against the pitch and against each other?"}, {"t": "p", "text": "Are the cones easy to trust quickly, or do they disappear into the surface?"}, {"t": "p", "text": "Am I relying too much on colour-only instructions?"}, {"t": "p", "text": "Can role, lane, side, number, or position carry some of the information instead?"}, {"t": "p", "text": "Is the session visually clean enough for the football task to be the real task?"}, {"t": "p", "text": "During the session, look for: A player who struggles more when bib colours change."}, {"t": "p", "text": "A player who becomes hesitant when cones or colour-coded zones appear."}, {"t": "p", "text": "A player who looks fine in one setup and lost in another."}, {"t": "p", "text": "A player who takes extra touches when the visual picture gets crowded."}, {"t": "p", "text": "A player who seems to improve quickly when the visual scene becomes clearer."}, {"t": "p", "text": "Coach from patterns, not only from single mistakes."}, {"t": "h1", "text": "Coach Match-Day Clarity Checklist", "id": "coach-match-day-clarity-checklist-2"}, {"t": "h2", "text": "Before the match"}, {"t": "p", "text": "Check the kit contrast as honestly as possible."}, {"t": "p", "text": "Ask whether the teams will still separate clearly under movement, distance, and light."}, {"t": "p", "text": "Notice whether the background, shadows, or weather may make things worse."}, {"t": "p", "text": "Prepare clear communication habits for the team."}, {"t": "p", "text": "Use names, positions, and early cues."}, {"t": "p", "text": "Remind players that early information helps the whole team."}, {"t": "h2", "text": "During the match"}, {"t": "p", "text": "Watch for hesitation that appears in certain visual moments."}, {"t": "p", "text": "Notice whether the player is overchecking before releasing the ball."}, {"t": "p", "text": "Do not assume visible delay always means low awareness or poor mentality."}, {"t": "p", "text": "Keep correction accurate, calm, and useful."}, {"t": "h2", "text": "After the match"}, {"t": "p", "text": "Ask what felt hard."}, {"t": "p", "text": "Ask what visual moments felt least trustworthy."}, {"t": "p", "text": "Ask what helped."}, {"t": "p", "text": "Build from what you learn."}, {"t": "h1", "text": "Player Match-Day Checklist", "id": "player-match-day-checklist-2"}, {"t": "h2", "text": "Before kick-off"}, {"t": "p", "text": "Know which teammates you need to identify quickest."}, {"t": "p", "text": "Choose your main anchors: shorts, socks, numbers, movement, voice, position."}, {"t": "p", "text": "Notice the kit contrast and ask yourself where the visual risks are."}, {"t": "p", "text": "Know which areas of the pitch will feel most crowded."}, {"t": "p", "text": "Decide what the simplest reliable option is when the picture becomes unclear."}, {"t": "p", "text": "Ask for early communication if needed."}, {"t": "p", "text": "During the game"}, {"t": "p", "text": "Trust your anchors."}, {"t": "p", "text": "Use the clearest action when the picture gets crowded."}, {"t": "p", "text": "Do not turn one difficult moment into a full collapse."}, {"t": "p", "text": "Reset quickly."}, {"t": "p", "text": "Keep scanning, but do not panic if you need one more check."}, {"t": "p", "text": "After the game"}, {"t": "p", "text": "Ask what conditions helped."}, {"t": "p", "text": "Ask what conditions made trust harder."}, {"t": "p", "text": "Keep learning your pattern."}, {"t": "p", "text": "Do not confuse one difficult visual moment with your whole identity as a player."}, {"t": "h1", "text": "Player Training Checklist", "id": "player-training-checklist-2"}, {"t": "h2", "text": "Before training"}, {"t": "p", "text": "Notice the bib colours."}, {"t": "p", "text": "Notice the cone colours."}, {"t": "p", "text": "Notice the lighting."}, {"t": "p", "text": "Notice whether the session looks visually simple or visually crowded."}, {"t": "p", "text": "Know your likely stress points before the drill starts."}, {"t": "h2", "text": "During training"}, {"t": "p", "text": "Use anchors early."}, {"t": "p", "text": "If the colours are poor, focus harder on shape, space, voice, number, and movement."}, {"t": "p", "text": "When unsure, choose a stable action rather than a rushed guess."}, {"t": "p", "text": "Do not let embarrassment force you into silence if one clear sentence could help."}, {"t": "h2", "text": "After training"}, {"t": "p", "text": "Ask yourself what felt hardest."}, {"t": "p", "text": "Ask what improved your trust."}, {"t": "p", "text": "Notice whether certain drills always create the same visual pressure."}, {"t": "p", "text": "That pattern is information, not weakness."}, {"t": "h1", "text": "Player In-The-Moment Reset", "id": "player-in-the-moment-reset-2"}, {"t": "p", "text": "When the picture feels unclear, use this reset."}, {"t": "p", "text": "That was one of those moments."}, {"t": "p", "text": "Reset."}, {"t": "p", "text": "Find the next clear action."}, {"t": "p", "text": "Use the anchor."}, {"t": "p", "text": "Play the stable option if needed."}, {"t": "p", "text": "Breathe once."}, {"t": "p", "text": "Stay in the game."}, {"t": "p", "text": "Do not turn one moment of doubt into five."}, {"t": "p", "text": "This is not about pretending the difficulty is not real."}, {"t": "p", "text": "It is about stopping the difficulty from taking over the next decision as well."}, {"t": "h1", "text": "Player Self-Advocacy Scripts", "id": "player-self-advocacy-scripts-2"}, {"t": "p", "text": "Use calm, clear language."}, {"t": "p", "text": "Do not apologise for needing clarity."}, {"t": "p", "text": "Try sentences like these:"}, {"t": "p", "text": "These bibs are hard for me to separate when everyone is moving."}, {"t": "p", "text": "If you call earlier, I can play quicker."}, {"t": "p", "text": "When the colours are close, shorts, socks, numbers, and early voices help me a lot."}, {"t": "p", "text": "If we use clearer contrast, I trust the picture much faster."}, {"t": "p", "text": "I am not asking for lower standards. I am asking for clearer information."}, {"t": "p", "text": "These scripts work best when they sound practical, not dramatic."}, {"t": "p", "text": "You are solving a football problem, not making excuses."}, {"t": "h1", "text": "Parent-to-Coach Script", "id": "parent-to-coach-script-2"}, {"t": "p", "text": "I wanted to mention something that may help explain a few patterns we have noticed."}, {"t": "p", "text": "I think colour vision may be part of what is going on for my child in certain football situations. It seems to show up more when the bib colours are close, when cones are hard to separate, or when the visual setup gets crowded."}, {"t": "p", "text": "I am not looking for lower standards or special treatment. I just thought it would help to mention it, because better contrast and clearer cues may make some of those difficult moments easier to understand and support."}, {"t": "p", "text": "I would really appreciate keeping the conversation calm and respectful so my child does not feel singled out in front of others."}, {"t": "p", "text": "Thank you for helping us understand it better."}, {"t": "h1", "text": "Greyscale Phone Test", "id": "greyscale-phone-test-2"}, {"t": "p", "text": "The greyscale phone test is a quick way of checking whether two colours still separate clearly when colour is taken away and only light-dark contrast remains."}, {"t": "h2", "text": "How to use it"}, {"t": "p", "text": "Take a photo of the bibs, kits, cones, or markers you plan to use."}, {"t": "p", "text": "Turn the image to black and white or greyscale."}, {"t": "p", "text": "Look at whether the two key colours still separate clearly."}, {"t": "p", "text": "If they collapse into similar shades of grey, the contrast may not be strong enough."}, {"t": "p", "text": "This is not a perfect scientific test, but it is a useful practical check."}, {"t": "p", "text": "If the setup is hard to separate in greyscale, it may become much harder to trust at speed on the pitch."}, {"t": "h1", "text": "Equipment Colour Matrix", "id": "equipment-colour-matrix-2"}, {"t": "h2", "text": "Safer defaults for football environments"}, {"t": "h2", "text": "Bibs"}, {"t": "p", "text": "Best default: blue versus yellow or white"}, {"t": "p", "text": "Be careful with: red versus green, blue versus purple, yellow versus orange, dark colours versus dark colours"}, {"t": "h2", "text": "Cones on grass"}, {"t": "p", "text": "Best default: white, blue, bright yellow"}, {"t": "p", "text": "Avoid when possible: red, orange, green, pink, dark grey"}, {"t": "h2", "text": "Line markings"}, {"t": "p", "text": "Best default: white"}, {"t": "p", "text": "Use caution with low-contrast coloured lines on green surfaces"}, {"t": "h2", "text": "Ball choice"}, {"t": "p", "text": "Choose a ball that separates clearly from the pitch and the visual background"}, {"t": "p", "text": "Be cautious with colours that disappear into grass, crowd colour, or poor light"}, {"t": "h2", "text": "General rule"}, {"t": "p", "text": "The clearer the contrast, the cleaner the decision-making."}, {"t": "h1", "text": "Club Colour Clarity Policy Starter", "id": "club-colour-clarity-policy-starter-2"}, {"t": "p", "text": "Our club recognises that colour blindness can affect players, coaches, staff, and families in ways that are often missed."}, {"t": "p", "text": "Where possible, we aim to:"}, {"t": "p", "text": "use training bib combinations with clear contrast"}, {"t": "p", "text": "use cone colours that remain easy to trust on the playing surface"}, {"t": "p", "text": "avoid relying on colour alone when giving important instructions"}, {"t": "p", "text": "encourage early and respectful communication"}, {"t": "p", "text": "treat information about colour blindness with discretion and dignity"}, {"t": "p", "text": "focus on improving clarity without lowering standards"}, {"t": "p", "text": "review avoidable visual barriers in training and match preparation"}, {"t": "p", "text": "This is not about special treatment."}, {"t": "p", "text": "It is about creating a better football environment for everyone."}, {"t": "h1", "text": "Best Sources by Role", "id": "best-sources-by-role"}, {"t": "h2", "text": "For players"}, {"t": "p", "text": "A good starting point is any clear, trustworthy explanation of colour blindness that helps you understand your own pattern without shame."}, {"t": "p", "text": "Look for resources that explain what colour blindness is, what it is not, and how people adapt in real life."}, {"t": "p", "text": "Useful categories include official health guidance, football-specific guidance, and practical lived-experience resources."}, {"t": "h2", "text": "For parents"}, {"t": "p", "text": "Parents usually benefit most from three kinds of sources:"}, {"t": "p", "text": "official health information on colour blindness and testing,"}, {"t": "p", "text": "clear school-age signs and support information,"}, {"t": "p", "text": "and football-specific guidance that explains how the issue can show up in sport."}, {"t": "p", "text": "Good parent resources should leave you calmer, clearer, and better able to act."}, {"t": "h2", "text": "For coaches"}, {"t": "p", "text": "Coaches need practical sources, not vague awareness."}, {"t": "p", "text": "The strongest sources are football-specific guidance on kit contrast, bib choice, cone choice, line clarity, and colour-safe communication."}, {"t": "p", "text": "Look for material that helps you improve the environment without lowering standards."}, {"t": "h2", "text": "For clubs and schools"}, {"t": "p", "text": "Clubs and schools benefit most from guidance that combines accessibility principles with real-life implementation."}, {"t": "p", "text": "Look for resources that explain why colour should not be the only signal carrying important information, and how small design changes improve clarity for everyone."}, {"t": "h1", "text": "Further Reading and Organisations", "id": "further-reading-and-organisations"}, {"t": "h2", "text": "NHS"}, {"t": "p", "text": "Useful for clear public guidance on colour blindness, testing, and the basics of what the condition is and is not."}, {"t": "h2", "text": "National Eye Institute"}, {"t": "p", "text": "Useful for plain-English explanations of the different types of colour vision deficiency and broader visual context."}, {"t": "h2", "text": "Colour Blind Awareness"}, {"t": "p", "text": "Useful for practical awareness, everyday examples, educational implications, and football-related accessibility discussions."}, {"t": "h2", "text": "The FA"}, {"t": "p", "text": "Useful for football-specific guidance, especially around coaching, training environments, and practical clarity on the pitch."}, {"t": "h2", "text": "UEFA"}, {"t": "p", "text": "Useful for football-specific accessibility guidance and wider awareness of how colour contrast affects the game."}, {"t": "h2", "text": "Optometrists and orthoptists"}, {"t": "p", "text": "Useful when proper testing or more detailed vision discussion is needed."}, {"t": "h2", "text": "Schools, clubs, and safeguarding leads"}, {"t": "p", "text": "Useful when the issue needs to be understood in a wider support setting beyond one team or one session."}, {"t": "p", "text": "When using any resource, choose the ones that are clear, practical, evidence-aware, and respectful."}, {"t": "p", "text": "Avoid miracle claims, dramatic marketing, or anything that promises a neat cure for a complex lifelong visual reality."}, {"t": "h1", "text": "Acknowledgements", "id": "acknowledgements"}, {"t": "p", "text": "Thank you to the players who have lived through confusion they could not always explain."}, {"t": "p", "text": "Thank you to the children who kept showing up even when the game felt unfair in ways nobody else could see."}, {"t": "p", "text": "Thank you to the parents who stood in the cold, watched closely, asked difficult questions, and tried to protect confidence when they did not yet have the full explanation."}, {"t": "p", "text": "Thank you to the coaches who care enough to look again, think again, and choose clarity over lazy assumptions."}, {"t": "p", "text": "Thank you to everyone who has spoken openly, privately, or publicly about what colour blindness can feel like in football and in life."}, {"t": "p", "text": "And thank you to the reader for taking this issue seriously."}, {"t": "p", "text": "Awareness begins with attention. Change begins when attention turns into action."}, {"t": "h1", "text": "About the Author", "id": "about-the-author"}, {"t": "p", "text": "Cornelius Aurelius is the author of Colour Blindness in Football."}, {"t": "p", "text": "This book was written to help players, parents, and coaches understand a hidden football problem that is often missed for too long. Its purpose is simple: to replace confusion with truth, reduce unnecessary shame, and offer practical ways to make the game clearer, fairer, and easier to trust."}, {"t": "p", "text": "At the heart of the book is a belief that many football struggles are judged too quickly and understood too late. This book was written to help change that."}, {"t": "p", "text": "For the next child, sooner."}, {"t": "h2", "text": "KEEP MOVING FORWARD"}, {"t": "h2", "text": "- CORNELIUS AURELIUS"}, {"t": "h2", "text": "CORNELIUSAURELIUS.COM"}, {"t": "h1", "text": "How to Get Tested for Colour Blindness", "id": "how-to-get-tested-for-colour-blindness"}, {"t": "p", "text": "If you think colour blindness might be part of your football story, do not wait for someone else to notice it for you. One of the biggest reasons colour blindness gets missed is simple: colour vision testing is often not included automatically in routine eye checks unless it is specifically asked for."}, {"t": "h2", "text": "Step 1: Book an eye appointment Ask an optometrist, optician, or eye professional for a colour vision test. The safest wording is simple:"}, {"t": "p", "text": "“Can I have a colour vision test as well, please? I think I may have problems distinguishing certain colours in football.”"}, {"t": "p", "text": "The research behind this book repeatedly points to the same pathway: request colour vision testing through an optometrist / eye professional if concerned."}, {"t": "h2", "text": "Step 2: Ask specifically for colour testing Do not assume it will happen automatically. Say clearly that you want your colour vision checked, not just your normal eyesight. A player can have otherwise good eyesight and still have colour blindness, which is one reason it gets missed."}, {"t": "h2", "text": "Step 3: Expect simple screening tests first Testing often starts with standard colour vision checks such as Ishihara-style plate tests, and sometimes other follow-up colour tests are used if needed. Some of the research in your files also mentions CAD testing as an example of a more specific colour vision assessment."}, {"t": "h2", "text": "Step 4: Explain the football problem clearly Tell them what actually happens in football, for example:"}, {"t": "h2", "text": "● “I struggle with some bib colours.” ● “I sometimes hesitate because kits look"}, {"t": "h2", "text": "too close.” ● “Red or orange cones on grass are hard"}, {"t": "h2", "text": "for me to trust.” ● “It gets worse in certain light.”"}, {"t": "p", "text": "That matters because colour blindness in football is not just about naming colours. It is often about fast visual separation under pressure."}, {"t": "h2", "text": "Step 5: If you are a child or teenager, get a parent involved The book’s research is clear that children often do not realise they see differently, and parents may need to ask specifically for colour testing rather than assuming it has already been picked up."}, {"t": "h2", "text": "Step 6: Use the result to help your football, not label yourself"}, {"t": "p", "text": "The point of testing is not to put a limit on you. The point is to give you an explanation, reduce shame, and help you make better choices with coaches, kit colours, bibs, cones, and match-day preparation. That is exactly the practical direction the book is built around."}, {"t": "h2", "text": "Simple script to use when booking “I’d like an eye test, and I specifically want my colour vision checked as well. I play football and I think certain colours, bibs, kits, or cones may be affecting me.”"}, {"t": "h2", "text": "Simple script for a player telling a parent or coach “I think I might have a colour-vision problem. Some colours are much harder for me to separate quickly, especially in football. Can we get it tested properly?”"}]</script>

    const BOOK = JSON.parse(document.getElementById('bookData').textContent);
    const STORAGE = 'ca_colour_blindness_in_football_reader_v5';
    const state = { pages: [], page: 0, fontSize: 20, theme: 'dark', startX: 0, startY: 0, toc: [] };
    const $ = (id) => document.getElementById(id);
    const pageInner = $('pageInner');
    const reader = $('reader');

    function save(){
      try{ localStorage.setItem(STORAGE, JSON.stringify({page:state.page, fontSize:state.fontSize, theme:state.theme})); }catch(e){}
    }
    function load(){
      try{
        const raw = localStorage.getItem(STORAGE);
        if(!raw) return;
        const s = JSON.parse(raw);
        if(Number.isFinite(s.page)) state.page = s.page;
        if(Number.isFinite(s.fontSize)) state.fontSize = Math.min(28, Math.max(15, s.fontSize));
        if(s.theme) state.theme = s.theme;
      }catch(e){}
    }
    function setVh(){
      const h = (window.visualViewport && window.visualViewport.height) ? window.visualViewport.height : window.innerHeight;
      document.documentElement.style.setProperty('--vh', h + 'px');
    }
    function setFont(){ document.documentElement.style.setProperty('--fontSize', state.fontSize + 'px'); }
    function setTheme(theme){
      state.theme = theme;
      document.body.className = 'theme-' + theme;
      save();
    }
    function escapeHTML(s){ return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
    function blockHTML(b){
      if(b.cover){ return `<div class="cover-wrap"><img src="${COVER}" alt="Colour Blindness in Football book cover by Cornelius Aurelius"></div>`; }
      const txt = escapeHTML(b.text || '');
      if(b.t === 'h1') return `<h1 data-id="${escapeHTML(b.id||'')}">${txt}</h1>`;
      if(b.t === 'h2') return `<h2>${txt}</h2>`;
      if(b.t === 'li') return `<p class="li">• ${txt}</p>`;
      if(b.t === 'toc') return `<p class="toc-line">${txt}</p>`;
      return `<p>${txt}</p>`;
    }
    function blocksHTML(blocks){ return blocks.map(blockHTML).join(''); }

    // Fast, device-aware pagination. It estimates safe page capacity from visible page size.
    // Pages are intentionally conservative on mobile to prevent cut-off words in social/in-app browsers.
    function pageCapacity(){
      setVh(); setFont();
      const cs = getComputedStyle(pageInner);
      const font = state.fontSize;
      const lineHeight = parseFloat(cs.lineHeight) || (font * 1.58);
      const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
      const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
      const contentW = Math.max(210, pageInner.clientWidth - padX);
      const contentH = Math.max(220, pageInner.clientHeight - padY);
      const avgChar = font * 0.52;
      const charsPerLine = Math.max(18, Math.floor(contentW / avgChar));
      const lines = Math.max(8, Math.floor(contentH / lineHeight));
      const raw = charsPerLine * lines;
      const mobile = window.innerWidth < 720;
      const landscapeSmall = window.innerHeight < 520;
      const safety = landscapeSmall ? 0.66 : (mobile ? 0.72 : 0.78);
      return Math.max(260, Math.floor(raw * safety));
    }

      if(b.t === 'h2') return len + 120;
      if(b.t === 'toc') return len + 35;
      if(b.t === 'li') return len + 50;
      return len + 55;
    }
    function splitBlock(block, available, cap){
      const overhead = cost(Object.assign({}, block, {text:''}));
      const maxChars = Math.max(120, Math.min(cap - overhead, available - overhead));
      const words = String(block.text || '').split(/\s+/).filter(Boolean);
      let out = [], current = [];
      let currentLen = 0;
      for(const w of words){
        const add = (current.length ? 1 : 0) + w.length;
        if(current.length && currentLen + add > maxChars){
          out.push(current.join(' ')); current = [w]; currentLen = w.length;
        } else { current.push(w); currentLen += add; }
      }
      if(current.length) out.push(current.join(' '));
      if(!out.length) out = [block.text || ''];
      return out;
    }
    function paginate(){
      setVh(); setFont();
      // Give layout one simple render target before reading sizes.
      pageInner.innerHTML = '&nbsp;';
      const cap = pageCapacity();
      const pages = [{cover:true, blocks:[{cover:true, text:'Cover'}]}];
      let cur = [], used = 0;
      function push(){ if(cur.length){ pages.push({blocks: cur}); cur = []; used = 0; } }
      function add(block){
        if(block.t === 'h1') push();
        const c = cost(block);
        if(c > cap * 0.92 && (block.t === 'p' || block.t === 'li' || block.t === 'toc')){
          let chunks = splitBlock(block, cap - used, cap);
          chunks.forEach((txt, idx) => {
            const b = Object.assign({}, block, {text: txt});
            const bc = cost(b);
            if(used + bc > cap && cur.length) push();
            cur.push(b); used += bc;
            if(idx < chunks.length - 1) push();
          });
          return;
        }
        if(used + c > cap && cur.length) push();
        cur.push(block); used += c;
      }
      BOOK.forEach(add);
      push();
      state.pages = pages;
      const toc = [{title:'Cover', id:'cover', page:0}];
      pages.forEach((pg, idx)=>{
        if(!pg.blocks) return;
        pg.blocks.forEach(b=>{ if(b.t === 'h1') toc.push({title:b.text, id:b.id||'', page:idx}); });
      });
      state.toc = toc;
      state.page = Math.min(Math.max(0, state.page), state.pages.length - 1);
      render();
      buildToc();
    }
    function render(){
      if(!state.pages.length) return;
      const pg = state.pages[state.page];
      pageInner.style.overflowY = 'hidden';
      pageInner.innerHTML = pg.cover ? blockHTML({cover:true}) : blocksHTML(pg.blocks);
      $('pageCount').textContent = `${state.page + 1} / ${state.pages.length}`;
      $('bar').style.width = `${((state.page + 1) / state.pages.length) * 100}%`;
      $('prevBtn').disabled = state.page <= 0;
      $('nextBtn').disabled = state.page >= state.pages.length - 1;
      $('chapterLabel').textContent = currentSection() || 'Cornelius Aurelius';
      requestAnimationFrame(() => {
        // Safety net: no words are hidden if a browser renders fonts differently.
        if(pageInner.scrollHeight > pageInner.clientHeight + 4) pageInner.style.overflowY = 'auto';
      });
      save();
    }
    function currentSection(){
      let title = 'Cover';
      for(const item of state.toc){ if(item.page <= state.page) title = item.title; else break; }
      return title;
    }
    function go(n){ state.page = Math.min(Math.max(0, n), state.pages.length - 1); render(); }
    function next(){ go(state.page + 1); }
    function prev(){ go(state.page - 1); }
    function buildToc(){
      const list = $('tocList');
      list.innerHTML = '';
      state.toc.forEach((item, i)=>{
        const btn = document.createElement('button');
        btn.textContent = `${item.title}  ·  p.${item.page + 1}`;
        if(item.page <= state.page && (!state.toc[i+1] || state.toc[i+1].page > state.page)) btn.classList.add('active');
        btn.onclick = () => { closeAll(); go(item.page); };
        list.appendChild(btn);
      });
    }
    function openMenu(){ $('drawer').style.display = 'block'; }
    function openToc(){ buildToc(); $('tocPanel').style.display = 'block'; }
    function closeAll(){ $('drawer').style.display = 'none'; $('tocPanel').style.display = 'none'; }
    function repaginateKeepSection(){
      const curTitle = currentSection();
      paginate();
      const item = state.toc.find(t=>t.title === curTitle);
      if(item) state.page = item.page;
      render();
    }

    $('prevBtn').onclick = prev;
    $('nextBtn').onclick = next;
    $('menuBtn').onclick = openMenu;
    $('tocBtn').onclick = openToc;
    $('openTocBtn').onclick = () => { $('drawer').style.display='none'; openToc(); };
    $('continueBtn').onclick = closeAll;
    $('closeMenu').onclick = closeAll;
    $('closeToc').onclick = closeAll;
    $('decreaseText').onclick = () => { state.fontSize = Math.max(15, state.fontSize - 1); save(); repaginateKeepSection(); };
    $('increaseText').onclick = () => { state.fontSize = Math.min(28, state.fontSize + 1); save(); repaginateKeepSection(); };
    document.querySelectorAll('[data-theme]').forEach(btn => btn.onclick = () => { setTheme(btn.dataset.theme); repaginateKeepSection(); });
    window.addEventListener('keydown', e => { if(e.key === 'ArrowRight') next(); if(e.key === 'ArrowLeft') prev(); if(e.key === 'Escape') closeAll(); });
    reader.addEventListener('touchstart', e => { const t=e.changedTouches[0]; state.startX=t.clientX; state.startY=t.clientY; }, {passive:true});
    reader.addEventListener('touchend', e => { const t=e.changedTouches[0]; const dx=t.clientX-state.startX; const dy=t.clientY-state.startY; if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.25){ dx<0 ? next() : prev(); } }, {passive:true});
    let resizeTimer;
    function onResize(){ clearTimeout(resizeTimer); resizeTimer=setTimeout(repaginateKeepSection,120); }
    window.addEventListener('resize', onResize);
    if(window.visualViewport) window.visualViewport.addEventListener('resize', onResize);

    load(); setTheme(state.theme); setFont(); paginate();
  })();
  </script>  </script>
