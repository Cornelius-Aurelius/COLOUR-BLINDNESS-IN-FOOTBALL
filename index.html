er’s shame."}, {"t": "p", "text": "All of it starts to sit inside a clearer picture."}, {"t": "p", "text": "And that clearer picture is the first step toward changing it."}, {"t": "p", "text": "Because once you can see the hidden football struggle, you stop treating the problem as random."}, {"t": "p", "text": "You stop blaming the player for every visible symptom."}, {"t": "p", "text": "You start asking better questions."}, {"t": "p", "text": "Which colours are being used here?"}, {"t": "p", "text": "What is blending into what?"}, {"t": "p", "text": "What is the player being asked to sort at speed?"}, {"t": "p", "text": "Where is the visual confusion entering the drill or the match?"}, {"t": "p", "text": "What can be made clearer without lowering the level?"}, {"t": "p", "text": "That is when football begins to get fairer."}, {"t": "p", "text": "Not softer."}, {"t": "p", "text": "Fairer."}, {"t": "p", "text": "And for a colour-blind player, fairer can feel like freedom."}, {"t": "h2", "text": "Chapter 4 Summary"}, {"t": "p", "text": "Football depends on rapid visual sorting, and colour is part of that information system."}, {"t": "p", "text": "The hidden football struggle appears when kits, bibs, cones, lines, balls, lighting, and movement make the visual picture less reliable for a colour-blind player."}, {"t": "p", "text": "The problem is not always obvious because the player can still play, still see, and still cope in many moments. But they may cope at a cost."}, {"t": "p", "text": "That cost can show up as hesitation, delayed passes, missed runners, cautious decisions, confusion in training drills, and a loss of trust in what they first saw."}, {"t": "p", "text": "Training can sometimes be even more visually difficult than matches because it often relies heavily on colour-coded organisation."}, {"t": "p", "text": "Poor visual setups can make a player look inconsistent when the real inconsistency is in the environment."}, {"t": "p", "text": "The struggle is not only about colour. It is about trust, speed, and the ability to act on information quickly enough."}, {"t": "p", "text": "Once the visual problem is recognised, football starts to make more sense, and the environment can be made clearer without lowering standards."}, {"t": "h1", "text": "Chapter 5 - The Split-Second Problem", "id": "chapter-5-the-split-second-problem"}, {"t": "p", "text": "Football is full of moments that are too small for most people to notice and big enough to change everything."}, {"t": "p", "text": "A shoulder check half a second earlier."}, {"t": "p", "text": "A pass released one touch sooner."}, {"t": "p", "text": "A run spotted just before the defender reacts."}, {"t": "p", "text": "A line seen in time."}, {"t": "p", "text": "A body shape read correctly."}, {"t": "p", "text": "A teammate trusted quickly enough."}, {"t": "p", "text": "Most of football does not break down in huge dramatic failures. It breaks down in fractions. Tiny delays. Tiny doubts. Tiny corrections. Tiny moments where the picture was not clear enough, fast enough, and the player was forced to think when the game was asking them to flow."}, {"t": "p", "text": "That is the split-second problem."}, {"t": "p", "text": "For a colour-blind player, the issue is not usually that the whole game becomes impossible. The issue is that some moments cost more to process than they cost other players. A decision that looks simple from the outside can contain one extra check on the inside. One extra moment of uncertainty. One extra question."}, {"t": "p", "text": "Is that definitely my teammate?"}, {"t": "p", "text": "Is that the right channel?"}, {"t": "p", "text": "Was that movement ours or theirs?"}, {"t": "p", "text": "Is that a cone, a shadow, a bib, a shirt, a line, a space I can trust?"}, {"t": "p", "text": "These questions do not always arrive as full sentences in the player’s head. Most of the time they arrive as hesitation."}, {"t": "p", "text": "Not a long hesitation."}, {"t": "p", "text": "A short one."}, {"t": "p", "text": "A football-short one."}, {"t": "p", "text": "The kind that can disappear from memory for everyone except the player who lived it and the coach who hated the result."}, {"t": "p", "text": "That is why the split-second problem is so easy to miss."}, {"t": "p", "text": "It does not announce itself like panic."}, {"t": "p", "text": "It does not always look like fear."}, {"t": "p", "text": "It often looks like a player who should have moved it quicker."}, {"t": "p", "text": "And that is exactly why it causes so much damage."}, {"t": "p", "text": "Because football is a sport that rewards the appearance of certainty."}, {"t": "p", "text": "The player who looks calm."}, {"t": "p", "text": "The player who looks decisive."}, {"t": "p", "text": "The player who plays on instinct."}, {"t": "p", "text": "The player who seems to know before everyone else knows."}, {"t": "p", "text": "These players are trusted. Praised. Repeated. Built around."}, {"t": "p", "text": "The player who hesitates, double-checks, delays, or looks unsure is often judged far more quickly. Even when the delay is coming from the quality of the information, not the quality of the player."}, {"t": "p", "text": "That is the heart of this chapter."}, {"t": "p", "text": "The split-second problem is not about intelligence."}, {"t": "p", "text": "It is not about bravery."}, {"t": "p", "text": "It is not about wanting it less."}, {"t": "p", "text": "It is about what happens when the brain has to spend extra time making sense of a visual scene that other players can sort more quickly."}, {"t": "p", "text": "The game does not have much patience for that extra time."}, {"t": "p", "text": "That is why the cost feels so high."}, {"t": "p", "text": "Imagine a player receiving the ball in midfield."}, {"t": "p", "text": "Before the ball arrives, they have already scanned. They have tried to build the picture. They know pressure is coming. They know the next decision must happen quickly. When the touch lands, they look again. Two shirts cross the same area of space. One is available. One is not. A teammate moves inside the line of another body. The colours are not clean enough to trust instantly. The player checks again."}, {"t": "p", "text": "There it is."}, {"t": "p", "text": "The split second."}, {"t": "p", "text": "Nothing dramatic."}, {"t": "p", "text": "No collapse."}, {"t": "p", "text": "No obvious crisis."}, {"t": "p", "text": "Just a tiny delay while the player moves from almost certain to certain enough."}, {"t": "p", "text": "For the coach, it can look like slowness."}, {"t": "p", "text": "For the player, it can feel like the moment breaking apart."}, {"t": "p", "text": "Because football lives on rhythm. When the decision lands at the right moment, the game opens. When it lands late, even by very little, the"}, {"t": "p", "text": "game closes. The runner is covered. The angle disappears. The defender steps in. The press arrives. The player is forced backwards. The crowd groans. The coach reacts. The teammate who was free a second earlier throws an arm up in frustration."}, {"t": "p", "text": "Now the player is not only dealing with the original uncertainty."}, {"t": "p", "text": "They are also dealing with the emotional aftershock of being late."}, {"t": "p", "text": "That matters."}, {"t": "p", "text": "Because repeated late moments change how a player feels before the next one even arrives."}, {"t": "p", "text": "This is where hesitation becomes more than a single action. It becomes a pattern."}, {"t": "p", "text": "The player starts to remember how bad it feels to get it wrong."}, {"t": "p", "text": "They remember the teammate’s reaction."}, {"t": "p", "text": "They remember the sideline."}, {"t": "p", "text": "They remember the embarrassment."}, {"t": "p", "text": "They remember how quickly one uncertain moment can make them look switched off."}, {"t": "p", "text": "So the next time the picture is not fully clean, the player may become even more careful."}, {"t": "p", "text": "That care can look sensible from inside the body."}, {"t": "p", "text": "From outside, it can look like overthinking."}, {"t": "p", "text": "And that is where the split-second problem starts feeding itself."}, {"t": "p", "text": "The player hesitates because the information is unclear."}, {"t": "p", "text": "Then the player hesitates because they remember what happened when they trusted the wrong thing."}, {"t": "p", "text": "Then the player hesitates because they are trying not to hesitate."}, {"t": "p", "text": "That is a miserable loop for any footballer to live inside."}, {"t": "p", "text": "Especially one who knows they can play."}, {"t": "p", "text": "Especially one who has moments where the game feels natural and fast and free."}, {"t": "p", "text": "Especially one who can feel, in real time, the difference between the days when the picture is clean and the days when every action feels slightly delayed by doubt."}, {"t": "p", "text": "This is why many players describe certain sessions or matches as mentally draining in a way other people do not understand."}, {"t": "p", "text": "The body may still be fresh enough."}, {"t": "p", "text": "The legs may still be there."}, {"t": "p", "text": "The technique may still be there."}, {"t": "p", "text": "But the head feels tired because it has been doing extra sorting all game."}, {"t": "p", "text": "Extra checking."}, {"t": "p", "text": "Extra confirming."}, {"t": "p", "text": "Extra correcting."}, {"t": "p", "text": "Extra protecting against the possibility of a public mistake."}, {"t": "p", "text": "That kind of effort is rarely visible."}, {"t": "p", "text": "It does not show up as a limp."}, {"t": "p", "text": "It does not show up as a dramatic complaint."}, {"t": "p", "text": "It shows up as a player who looks a little less free."}, {"t": "p", "text": "A little less natural."}, {"t": "p", "text": "A little less willing to play first time."}, {"t": "p", "text": "A little more eager to take the extra touch that gives them one more second to be sure."}, {"t": "p", "text": "That extra touch is important."}, {"t": "p", "text": "In football, an extra touch is not always a technical problem. Sometimes it is a trust problem. The player does not take another touch because they"}, {"t": "p", "text": "cannot pass. They take another touch because they do not yet trust the picture enough to release the pass."}, {"t": "p", "text": "That is a very different thing."}, {"t": "p", "text": "And it changes what the solution should be."}, {"t": "p", "text": "Shouting one-touch at a player who does not trust what they are seeing is not always coaching. Sometimes it is just pressure applied to the wrong layer of the problem."}, {"t": "p", "text": "The same is true of phrases like wake up, scan earlier, move it quicker, you have more time than you think."}, {"t": "p", "text": "These phrases can be useful in normal football coaching. But if a player is already scanning and still not getting a clean enough picture, then the issue is not effort alone. It is the quality of the visual scene they are being asked to process."}, {"t": "p", "text": "That is why this chapter matters so much."}, {"t": "p", "text": "It protects the player from being falsely reduced to the visible symptom."}, {"t": "p", "text": "Hesitation is the symptom."}, {"t": "p", "text": "The problem may be the uncertainty underneath it."}, {"t": "p", "text": "This is where another idea enters: paradox of choice."}, {"t": "p", "text": "That phrase is useful here, not because the player literally has too many good choices, but because uncertainty can turn ordinary football decisions into mentally crowded moments. Instead of one obvious pass feeling obvious, the player feels the need to verify multiple possibilities. Is that definitely my teammate? Is the shirt right? Is the movement right? Is the lane really open? If I play it quickly and I am wrong, how bad will it look? If I hold it and I am late, how bad will that look?"}, {"t": "p", "text": "Now the player is not only reading the game."}, {"t": "p", "text": "They are managing the consequences of not fully trusting the game."}, {"t": "p", "text": "That can happen in seconds."}, {"t": "p", "text": "Sometimes in less than seconds."}, {"t": "p", "text": "And because it happens so fast, people often assume it is not happening at all."}, {"t": "p", "text": "But the player feels it."}, {"t": "p", "text": "They feel it in the tightening of the decision."}, {"t": "p", "text": "They feel it in the extra breath before the pass."}, {"t": "p", "text": "They feel it in the body becoming careful when it wanted to be automatic."}, {"t": "p", "text": "That word matters too: automatic."}, {"t": "p", "text": "Good football often feels automatic when it is going well. Not careless. Not mindless. Automatic in the best sense. The player has trained so much, seen so much, and trusted so much that the action can happen before doubt has time to interrupt it. They scan, receive, release. They move, check, play. They act in rhythm with the game instead of fighting to stay inside it."}, {"t": "p", "text": "That is what many players mean when they talk about flow."}, {"t": "p", "text": "Not some mystical state."}, {"t": "p", "text": "Just football feeling natural."}, {"t": "p", "text": "Football feeling like it arrives in the right order."}, {"t": "p", "text": "Football feeling like the body and the picture agree."}, {"t": "p", "text": "The split-second problem interferes with that agreement."}, {"t": "p", "text": "Again, not always."}, {"t": "p", "text": "But often enough."}, {"t": "p", "text": "When the player has to consciously resolve uncertainty, the action becomes heavier. The body that wanted to act on instinct is pulled back into checking mode. And once that happens repeatedly, the player can start to feel as if their football is trapped between what they know and what they trust."}, {"t": "p", "text": "That is exhausting."}, {"t": "p", "text": "It also does something cruel to confidence."}, {"t": "p", "text": "Most players can accept making mistakes when they feel the mistake came from an honest football action. A risky pass that did not come off. A brave idea that failed. A tough decision made at speed."}, {"t": "p", "text": "Those mistakes are part of the game."}, {"t": "p", "text": "But a mistake born from hesitation feels different."}, {"t": "p", "text": "A mistake born from uncertainty feels worse."}, {"t": "p", "text": "A mistake that arrives after doubt already entered the moment feels like a personal failure twice over. First the player did not trust the picture. Then they got punished anyway."}, {"t": "p", "text": "That creates a very specific kind of confidence damage."}, {"t": "p", "text": "The player stops fearing only failure."}, {"t": "p", "text": "They start fearing the feeling before failure."}, {"t": "p", "text": "The uncertain feeling."}, {"t": "p", "text": "The half-sure feeling."}, {"t": "p", "text": "The I-think-this-is-right-but-I-do-not-fully-trust-it feeling."}, {"t": "p", "text": "Once that fear sets in, the game can start to feel mentally crowded even before anything has gone wrong. The player walks into the session already aware that certain bib colours are bad. They walk into the match already aware that the kits may be a problem. They know what certain lighting does. They know which drills tend to expose them. They know which moments on the pitch force the fastest identity checks. That anticipation is useful in one sense, because it helps them prepare. But it can also become another source of load."}, {"t": "p", "text": "Now the player is not just handling the problem."}, {"t": "p", "text": "They are bracing for the problem."}, {"t": "p", "text": "That is why even very talented players can end up looking strangely inconsistent."}, {"t": "p", "text": "In one environment, they are free."}, {"t": "p", "text": "In another, they are trapped between decision and doubt."}, {"t": "p", "text": "In one session, they look like themselves."}, {"t": "p", "text": "In another, they look like a worse version of themselves."}, {"t": "p", "text": "Coaches often hate inconsistency because it feels like unpredictability of character. But visual inconsistency can create football inconsistency without the player changing as a person at all."}, {"t": "p", "text": "That needs to be said plainly."}, {"t": "p", "text": "Sometimes the player is not inconsistent."}, {"t": "p", "text": "The environment is."}, {"t": "p", "text": "This is one of the most useful shifts a coach or parent can make. Instead of asking, Why is the player different today? ask, What is different in the visual task today? What colours are in use? What is the light doing? How much movement overlap is there? What is the player being forced to sort at speed?"}, {"t": "p", "text": "These are better questions."}, {"t": "p", "text": "Not softer questions."}, {"t": "p", "text": "More accurate ones."}, {"t": "p", "text": "The player needs better questions too."}, {"t": "p", "text": "Because one of the worst things a young footballer can do is turn every split-second struggle into a verdict on their own mind."}, {"t": "p", "text": "I’m too slow."}, {"t": "p", "text": "I freeze."}, {"t": "p", "text": "I overthink."}, {"t": "p", "text": "I panic."}, {"t": "p", "text": "I’m not sharp enough."}, {"t": "p", "text": "I don’t see it quick enough."}, {"t": "p", "text": "Some of those statements describe what the player feels."}, {"t": "p", "text": "But if they become identity statements, they start shaping the player’s relationship with the game in a very destructive way."}, {"t": "p", "text": "This chapter is trying to loosen that grip."}, {"t": "p", "text": "A player may need to hear, very clearly, that hesitation is not proof of stupidity."}, {"t": "p", "text": "That caution is not proof of weakness."}, {"t": "p", "text": "That needing one more check in certain visual situations is not moral failure."}, {"t": "p", "text": "That the goal is not to become magically certain in impossible conditions."}, {"t": "p", "text": "The goal is to understand the conditions, reduce the unnecessary uncertainty, and build methods for the moments that cannot be fully cleaned up."}, {"t": "p", "text": "That matters because football will never be perfectly controlled."}, {"t": "p", "text": "There will be bad bibs."}, {"t": "p", "text": "Bad light."}, {"t": "p", "text": "Bad contrast."}, {"t": "p", "text": "Bad weather."}, {"t": "p", "text": "Bad kit choices."}, {"t": "p", "text": "Busy backgrounds."}, {"t": "p", "text": "Fast transitions."}, {"t": "p", "text": "Messy moments."}, {"t": "p", "text": "No player gets the perfect picture every time."}, {"t": "p", "text": "The difference is that a colour-blind player may be taxed more heavily by those imperfections."}, {"t": "p", "text": "That is exactly why methods matter."}, {"t": "p", "text": "A player who understands the split-second problem can start preparing around it instead of drowning inside it."}, {"t": "p", "text": "They can start noticing their triggers."}, {"t": "p", "text": "Which moments create the most doubt?"}, {"t": "p", "text": "Which colours create the most delay?"}, {"t": "p", "text": "Which conditions make first-time trust harder?"}, {"t": "p", "text": "Which roles on the pitch ask for the fastest identity decisions?"}, {"t": "p", "text": "Where can I simplify early?"}, {"t": "p", "text": "What anchors can I use before I need them?"}, {"t": "p", "text": "This is where the chapter starts turning toward hope."}, {"t": "p", "text": "Because once the split-second problem is named, it becomes easier to work with."}, {"t": "p", "text": "A player can decide in advance what cues they trust most. Shorts. Socks. Numbers. Position. Body shape. Movement patterns. Voice. That does not eliminate the visual problem. But it reduces the panic of having no plan when uncertainty enters."}, {"t": "p", "text": "A player can also learn decision rules for certain moments."}, {"t": "p", "text": "If the first picture is unclear, can I use one safer action that keeps the move alive instead of forcing a risky guess?"}, {"t": "p", "text": "If the colours are bad in this half, do I need earlier communication from teammates?"}, {"t": "p", "text": "If I know this drill setup causes delay, what do I need to lock onto before the ball even arrives?"}, {"t": "p", "text": "These are football questions, not excuses."}, {"t": "p", "text": "That distinction matters."}, {"t": "p", "text": "This chapter is not here to tell the player to retreat into caution forever. It is here to stop them being shamed for the invisible cost of uncertainty and to show that good football solutions begin with honest naming."}, {"t": "p", "text": "The split-second problem is real because football is real."}, {"t": "p", "text": "The speed is real."}, {"t": "p", "text": "The pressure is real."}, {"t": "p", "text": "The demand for certainty is real."}, {"t": "p", "text": "And if a player is repeatedly forced to spend extra mental energy getting to that certainty, it makes sense that the game can start to feel harder, heavier, and less free."}, {"t": "p", "text": "What does not make sense is pretending that this says something shameful about the player’s character."}, {"t": "p", "text": "It does not."}, {"t": "p", "text": "It says something about the burden of playing a fast visual sport with a visual difference that other people may not see."}, {"t": "p", "text": "That burden becomes lighter when it is understood."}, {"t": "p", "text": "Lighter when it is named."}, {"t": "p", "text": "Lighter when the player stops turning every delayed action into self-hatred."}, {"t": "p", "text": "Lighter when the adults around them stop coaching the symptom as if it were the whole truth."}, {"t": "p", "text": "This is why the split-second problem matters so much in the story of colour blindness in football."}, {"t": "p", "text": "Because the whole game can change in a second."}, {"t": "p", "text": "And for some players, the hidden struggle lives inside the fraction before that second is gone."}, {"t": "h2", "text": "Chapter 5 Summary"}, {"t": "p", "text": "Football often turns on tiny moments, and colour blindness can make some of those moments cost more to process."}, {"t": "p", "text": "The split-second problem is the extra uncertainty a player may feel when they cannot trust the visual picture quickly enough."}, {"t": "p", "text": "This can show up as hesitation, extra touches, delayed passes, overchecking, mental tiredness, and a loss of automatic play."}, {"t": "p", "text": "The issue is not usually that the player cannot work it out at all. The issue is the cost of working it out in time."}, {"t": "p", "text": "Repeated uncertain moments can damage confidence, increase caution, and make the player fear the feeling of doubt itself."}, {"t": "p", "text": "The player is not necessarily inconsistent. The environment may be inconsistent for their eyes."}, {"t": "p", "text": "Once the split-second problem is understood, the player can begin building methods, anchors, and decision rules instead of turning every struggle into a judgment on their intelligence or character."}, {"t": "p", "text": "Hesitation is the visible symptom. The hidden issue may be the uncertainty underneath it."}, {"t": "h1", "text": "Chapter 6 - Childhood, Confidence, and Identity", "id": "chapter-6-childhood-confidence-and-identity"}, {"t": "p", "text": "A child can live inside confusion for years before anyone around them realises what that confusion has been doing to them."}, {"t": "p", "text": "That is one of the deepest costs of missed colour blindness in football."}, {"t": "p", "text": "Not the obvious mistakes."}, {"t": "p", "text": "Not the occasional wrong pass."}, {"t": "p", "text": "Not even the frustration of a bad session."}, {"t": "p", "text": "The deeper cost is what those moments begin to build inside the child."}, {"t": "p", "text": "A boy stands on the pitch and hears the same correction again."}, {"t": "p", "text": "Wake up."}, {"t": "p", "text": "Sharper."}, {"t": "p", "text": "You have to see that."}, {"t": "p", "text": "Move it quicker."}, {"t": "p", "text": "It may sound ordinary to everyone else. Just football. Just coaching. Just heat in the moment. But a child does not always hear those words as neutral instruction. A child often hears them as evidence."}, {"t": "p", "text": "Evidence that something is wrong with me."}, {"t": "p", "text": "Evidence that I am slower than everyone else."}, {"t": "p", "text": "Evidence that I keep missing things I should not miss."}, {"t": "p", "text": "Evidence that maybe I am not what I thought I was."}, {"t": "p", "text": "That is how confidence starts to fray."}, {"t": "p", "text": "Not always in one dramatic break."}, {"t": "p", "text": "More often in little tears."}, {"t": "p", "text": "A public mistake here."}, {"t": "p", "text": "A confused moment there."}, {"t": "p", "text": "A session that felt humiliating."}, {"t": "p", "text": "A match where things went wrong too quickly to explain."}, {"t": "p", "text": "A parent trying to encourage them on the way home while the child stares out of the window and says almost nothing."}, {"t": "p", "text": "A coach who means well but keeps returning to the same criticism."}, {"t": "p", "text": "A teammate’s frustrated reaction."}, {"t": "p", "text": "The laugh after the wrong pass."}, {"t": "p", "text": "The look that says, How did you not see that?"}, {"t": "p", "text": "These things accumulate."}, {"t": "p", "text": "Children are very good at carrying things they do not yet know how to name."}, {"t": "p", "text": "They carry embarrassment before they can explain it."}, {"t": "p", "text": "They carry confusion before they can analyse it."}, {"t": "p", "text": "They carry shame before they understand where it came from."}, {"t": "p", "text": "And if colour blindness is part of the hidden cause, the child is often left trying to make emotional sense of football experiences that never made clear visual sense in the first place."}, {"t": "p", "text": "That is a lonely place to grow from."}, {"t": "p", "text": "Because football is rarely just football for a child who loves it."}, {"t": "p", "text": "It is belonging."}, {"t": "p", "text": "It is identity."}, {"t": "p", "text": "It is status among friends."}, {"t": "p", "text": "It is the place where they get to feel brave, gifted, fast, clever, competitive, admired, free."}, {"t": "p", "text": "It is the place where effort turns into something visible."}, {"t": "p", "text": "It is the place where they imagine a future version of themselves."}, {"t": "p", "text": "So when football becomes one of the main places where they feel confused, exposed, or repeatedly wrong, the damage does not stay neatly inside sport."}, {"t": "p", "text": "It reaches into identity."}, {"t": "p", "text": "A child who is repeatedly misunderstood on the pitch can start to feel misunderstood in themselves."}, {"t": "p", "text": "That is where some of the most painful words in your files come from."}, {"t": "p", "text": "Fear."}, {"t": "p", "text": "Embarrassed."}, {"t": "p", "text": "Inconsistent."}, {"t": "p", "text": "Stupid."}, {"t": "p", "text": "Hopeless."}, {"t": "p", "text": "Frustrated."}, {"t": "p", "text": "Misunderstood."}, {"t": "p", "text": "Invisible."}, {"t": "p", "text": "Confused."}, {"t": "p", "text": "These are not casual words."}, {"t": "p", "text": "They are identity words."}, {"t": "p", "text": "They describe what happens when repeated football moments stop feeling like separate events and start feeling like proof of who the child is."}, {"t": "p", "text": "If a player misreads one moment, they can brush it off."}, {"t": "p", "text": "If they misread many moments, and nobody around them names the hidden problem properly, the child begins building a story."}, {"t": "p", "text": "I always mess things up."}, {"t": "p", "text": "I always look stupid."}, {"t": "p", "text": "I am the one who gets it wrong."}, {"t": "p", "text": "I am the one who is nearly good enough but not really."}, {"t": "p", "text": "I am the one who cannot be trusted."}, {"t": "p", "text": "I am the one who tries hard and still looks bad."}, {"t": "p", "text": "That story becomes dangerous because children often believe stories they would never choose on purpose."}, {"t": "p", "text": "Not because they are weak."}, {"t": "p", "text": "Because they are trying to make sense of repeated emotional pain."}, {"t": "p", "text": "They need an explanation."}, {"t": "p", "text": "If no truthful explanation arrives, blame usually arrives first."}, {"t": "p", "text": "And blame is powerful when it settles early."}, {"t": "p", "text": "It changes posture."}, {"t": "p", "text": "It changes body language."}, {"t": "p", "text": "It changes the way a child asks for the ball."}, {"t": "p", "text": "It changes how quickly they recover from a mistake."}, {"t": "p", "text": "It changes whether they take risks."}, {"t": "p", "text": "It changes whether they enjoy training day or dread it."}, {"t": "p", "text": "It changes what football starts to feel like before the session has even begun."}, {"t": "p", "text": "This is why the emotional cost of hidden visual struggle is never a soft extra in this book. It is central."}, {"t": "p", "text": "A child who keeps being put in positions where they look uncertain or careless may begin to protect themselves in whatever ways they can."}, {"t": "p", "text": "Some become quieter."}, {"t": "p", "text": "Some become angrier."}, {"t": "p", "text": "Some become class clowns so they can control the embarrassment before it reaches them."}, {"t": "p", "text": "Some become safer players, always taking the easier option because the easier option feels less dangerous."}, {"t": "p", "text": "Some stop asking questions."}, {"t": "p", "text": "Some stop admitting confusion."}, {"t": "p", "text": "Some stop taking responsibility on the pitch because responsibility feels too exposing."}, {"t": "p", "text": "Some begin to look like they care less, when the truth is that they care so much that they cannot bear one more public failure."}, {"t": "p", "text": "Adults often misunderstand this too."}, {"t": "p", "text": "A child who withdraws can look lazy."}, {"t": "p", "text": "A child who becomes flat can look uninterested."}, {"t": "p", "text": "A child who avoids risk can look limited."}, {"t": "p", "text": "A child who shuts down after criticism can look soft."}, {"t": "p", "text": "But sometimes what adults are seeing is not weakness."}, {"t": "p", "text": "It is self-protection."}, {"t": "p", "text": "The child is trying to survive repeated experiences of feeling wrong in public."}, {"t": "p", "text": "That matters because self-protection can become part of identity too."}, {"t": "p", "text": "A player who starts as expressive and brave can slowly become careful and guarded."}, {"t": "p", "text": "A child who once loved trying things can begin playing not to fail."}, {"t": "p", "text": "A player who once ran toward the game can begin shrinking around the moments that most expose them."}, {"t": "p", "text": "The saddest part is that adults often respond to that shrinking with more pressure."}, {"t": "p", "text": "Come on."}, {"t": "p", "text": "Be brave."}, {"t": "p", "text": "Trust yourself."}, {"t": "p", "text": "Take responsibility."}, {"t": "p", "text": "Again, those are not wrong messages in themselves."}, {"t": "p", "text": "But they land very differently if the child’s loss of confidence is tied to repeated visual uncertainty that nobody has named."}, {"t": "p", "text": "Trust yourself sounds simple when the player trusts the picture."}, {"t": "p", "text": "It sounds impossible when the picture itself has betrayed them too many times."}, {"t": "p", "text": "That is what hidden colour blindness can do to confidence."}, {"t": "p", "text": "It can make self-trust feel risky."}, {"t": "p", "text": "Not because the player lacks courage."}, {"t": "p", "text": "Because the environment has taught them that what feels clear one second can become costly the next."}, {"t": "p", "text": "A child may not be able to describe this in adult language."}, {"t": "p", "text": "They may not say, I am struggling with confidence because repeated visual uncertainty has changed my relationship with instinct and risk."}, {"t": "p", "text": "They say it differently."}, {"t": "p", "text": "I hate these bibs."}, {"t": "p", "text": "I don’t know."}, {"t": "p", "text": "I thought he was ours."}, {"t": "p", "text": "I just didn’t see it."}, {"t": "p", "text": "I’m rubbish today."}, {"t": "p", "text": "I can’t be bothered."}, {"t": "p", "text": "I don’t care."}, {"t": "p", "text": "Leave me alone."}, {"t": "p", "text": "None of those statements fully explain what is happening."}, {"t": "p", "text": "But all of them may be carrying pieces of it."}, {"t": "p", "text": "This is why childhood matters so much in the story of colour blindness in football."}, {"t": "p", "text": "Children do not only experience the game."}, {"t": "p", "text": "They become themselves inside it."}, {"t": "p", "text": "Or at least, they start trying to."}, {"t": "p", "text": "They learn whether they are the kid who is trusted."}, {"t": "p", "text": "The kid who is brave."}, {"t": "p", "text": "The kid who performs."}, {"t": "p", "text": "The kid who stays on."}, {"t": "p", "text": "The kid who gets shouted at."}, {"t": "p", "text": "The kid who seems nearly there but never quite convincing."}, {"t": "p", "text": "The kid who sits on the bench too often."}, {"t": "p", "text": "The kid who gets one minute at the end."}, {"t": "p", "text": "The kid who always feels one step behind the version of themselves they know exists."}, {"t": "p", "text": "That is part of the pain in Number 12’s story."}, {"t": "p", "text": "Not just that he struggled."}, {"t": "p", "text": "That he loved the game so much."}, {"t": "p", "text": "That he thought about football all the time."}, {"t": "p", "text": "That he practised alone."}, {"t": "p", "text": "That he dreamed properly."}, {"t": "p", "text": "That he carried the dream seriously."}, {"t": "p", "text": "And still spent years being benched, misunderstood, and judged for moments he could not explain."}, {"t": "p", "text": "That is identity damage."}, {"t": "p", "text": "When a child gives their heart to something and the thing they love keeps sending back confusion, blame, and public frustration, it leaves a mark."}, {"t": "p", "text": "Even after awareness comes later, the older emotional bruises do not disappear immediately."}, {"t": "p", "text": "The body remembers."}, {"t": "p", "text": "The player remembers."}, {"t": "p", "text": "The mind remembers the sessions where the cones came out and everything got worse."}, {"t": "p", "text": "The matches where the wrong kit felt impossible."}, {"t": "p", "text": "The looks from teammates."}, {"t": "p", "text": "The ride home."}, {"t": "p", "text": "The feeling of wanting another chance and also fearing the next chance."}, {"t": "p", "text": "That is why late understanding can bring relief and grief at the same time."}, {"t": "p", "text": "Relief, because at last the child or young adult has a name for the struggle."}, {"t": "p", "text": "Grief, because once the name arrives, so does the question."}, {"t": "p", "text": "What would things have felt like if someone had known sooner?"}, {"t": "p", "text": "That question can hurt."}, {"t": "p", "text": "Not because it changes the past."}, {"t": "p", "text": "Because it reveals how much of the past was shaped by the wrong explanation."}, {"t": "p", "text": "A player who thought they were stupid may realise they were trying to solve a hidden visual problem."}, {"t": "p", "text": "A parent who thought their child lacked confidence may realise confidence was being damaged by repeated avoidable confusion."}, {"t": "p", "text": "A coach may look back and understand that some of the behaviours they criticised were not signs of poor mentality at all."}, {"t": "p", "text": "That can bring sadness."}, {"t": "p", "text": "It can also bring compassion."}, {"t": "p", "text": "And compassion matters here, not as softness, but as correction."}, {"t": "p", "text": "A child who was misunderstood needs a different story now."}, {"t": "p", "text": "Not a pity story."}, {"t": "p", "text": "Not a broken story."}, {"t": "p", "text": "A truer story."}, {"t": "p", "text": "You were not imagining it."}, {"t": "p", "text": "You were not weak."}, {"t": "p", "text": "You were not stupid."}, {"t": "p", "text": "You were trying to play a game you loved while carrying a problem nobody had named properly."}, {"t": "p", "text": "That kind of truth can be life-changing."}, {"t": "p", "text": "Because children often grow up, but the names they were given do not always leave with childhood."}, {"t": "p", "text": "The hesitant child becomes the adult who still says, I overthink everything."}, {"t": "p", "text": "The embarrassed child becomes the adult who still hates being wrong in public."}, {"t": "p", "text": "The player who felt unreliable becomes the adult who still struggles to trust first instincts."}, {"t": "p", "text": "The one who felt invisible becomes the adult who still half-expects not to be understood."}, {"t": "p", "text": "Football may have been the setting."}, {"t": "p", "text": "But the identity lessons can travel much further."}, {"t": "p", "text": "That is why this chapter is not only for children."}, {"t": "p", "text": "It is also for the older player who is only now realising how much those years shaped them."}, {"t": "p", "text": "It is for the parent who needs to understand that confidence is not a random mood children either have or do not have. Confidence is built inside repeated experience. If repeated experience keeps saying, You are late, wrong, confusing, unreliable, or exposed, then confidence is not simply going to appear because a parent says, Believe in yourself."}, {"t": "p", "text": "Belief needs evidence too."}, {"t": "p", "text": "Children build belief from what the world keeps teaching them about themselves."}, {"t": "p", "text": "That is why early awareness matters so much."}, {"t": "p", "text": "Not because colour blindness is the whole story."}, {"t": "p", "text": "Because it might be a hidden part of the story that is doing more damage than anyone realises."}, {"t": "p", "text": "Once that part is named, the emotional environment can change."}, {"t": "p", "text": "The child no longer has to sit alone with every mistake."}, {"t": "p", "text": "The parent can respond with understanding instead of guesswork."}, {"t": "p", "text": "The coach can stop treating the same repeated confusion like character failure."}, {"t": "p", "text": "The child can begin to separate identity from symptom."}, {"t": "p", "text": "That separation is one of the most important emotional moves in the whole book."}, {"t": "p", "text": "I hesitated is not the same as I am weak."}, {"t": "p", "text": "I misread that is not the same as I am stupid."}, {"t": "p", "text": "I got confused is not the same as I do not belong here."}, {"t": "p", "text": "Those are different sentences."}, {"t": "p", "text": "And for some children, learning the difference can save years of self-blame."}, {"t": "p", "text": "It can also change how they carry themselves in the game."}, {"t": "p", "text": "Confidence does not always return all at once."}, {"t": "p", "text": "Sometimes it comes back in tiny moments."}, {"t": "p", "text": "A clearer session."}, {"t": "p", "text": "A better kit contrast."}, {"t": "p", "text": "A coach who understands sooner."}, {"t": "p", "text": "A parent who finally knows what question to ask."}, {"t": "p", "text": "A player realising, That wasn’t me being useless. That was one of the situations I struggle with."}, {"t": "p", "text": "These moments matter because confidence is not built by speeches."}, {"t": "p", "text": "It is built by repeated experience of being able to trust yourself again."}, {"t": "p", "text": "That trust may come slowly."}, {"t": "p", "text": "Especially if the child or player has spent years learning the opposite."}, {"t": "p", "text": "But it can come."}, {"t": "p", "text": "And when it does, something else begins to heal alongside it."}, {"t": "p", "text": "Identity."}, {"t": "p", "text": "The player no longer has to build themselves around shame."}, {"t": "p", "text": "They can start building around truth."}, {"t": "p", "text": "I am still competitive."}, {"t": "p", "text": "I am still capable."}, {"t": "p", "text": "I still love the game."}, {"t": "p", "text": "I still have instincts."}, {"t": "p", "text": "I still have strengths."}, {"t": "p", "text": "Some things are harder for me in certain visual conditions, and now I know that."}, {"t": "p", "text": "That is a very different identity from the one hidden confusion creates."}, {"t": "p", "text": "It is also a stronger identity."}, {"t": "p", "text": "Not because it is easier."}, {"t": "p", "text": "Because it is more honest."}, {"t": "p", "text": "This is where another important truth belongs."}, {"t": "p", "text": "A child does not need to be told that colour blindness is a superpower in order to feel better."}, {"t": "p", "text": "False exaggeration rarely helps."}, {"t": "p", "text": "But a child does need to know that difficulty is not the same as deficiency of worth."}, {"t": "p", "text": "They need to know that resilience can grow here."}, {"t": "p", "text": "Perspective can grow here."}, {"t": "p", "text": "Empathy can grow here."}, {"t": "p", "text": "Mental toughness can grow here."}, {"t": "p", "text": "The ability to think differently can grow here."}, {"t": "p", "text": "So can the ability to understand struggle in other people without mocking it."}, {"t": "p", "text": "Those are real positives."}, {"t": "p", "text": "Not fake compensation prizes."}, {"t": "p", "text": "Real positives that can sit alongside very real frustrations."}, {"t": "p", "text": "That balance matters."}, {"t": "p", "text": "Too much tragedy and the child feels doomed."}, {"t": "p", "text": "Too much fake positivity and the child feels misunderstood again."}, {"t": "p", "text": "The truth is stronger."}, {"t": "p", "text": "Some parts are harder."}, {"t": "p", "text": "Some costs are real."}, {"t": "p", "text": "Some moments have been unfair."}, {"t": "p", "text": "And still, the child is more than the struggle."}, {"t": "p", "text": "That is what this chapter is trying to protect."}, {"t": "p", "text": "The child behind the symptoms."}, {"t": "p", "text": "The person behind the repeated mistakes."}, {"t": "p", "text": "The identity behind the misunderstanding."}, {"t": "p", "text": "Because once a child has spent long enough feeling exposed, stupid, or invisible, the real task is no longer only helping them play better."}, {"t": "p", "text": "It is helping them feel like themselves again."}, {"t": "p", "text": "That may start with something simple."}, {"t": "p", "text": "An adult finally saying, I think there may be a reason this has felt harder for you."}, {"t": "p", "text": "Not a reason to pity you."}, {"t": "p", "text": "A reason to understand you."}, {"t": "p", "text": "That sentence can open a door."}, {"t": "p", "text": "Not just into support."}, {"t": "p", "text": "Into dignity."}, {"t": "p", "text": "And dignity matters in childhood more than many adults remember."}, {"t": "p", "text": "A child can survive tough coaching."}, {"t": "p", "text": "They can survive mistakes."}, {"t": "p", "text": "They can survive bad games."}, {"t": "p", "text": "What is much harder to survive well is the feeling that who they are is being damaged by a problem nobody else seems able to see."}, {"t": "p", "text": "That is why this chapter matters."}, {"t": "p", "text": "Because football can shape identity powerfully in both directions."}, {"t": "p", "text": "It can build a child."}, {"t": "p", "text": "Or it can quietly teach a child to shrink."}, {"t": "p", "text": "The difference is not only talent."}, {"t": "p", "text": "It is not only opportunity."}, {"t": "p", "text": "Sometimes it is whether the adults around them understood what was really happening before shame got there first."}, {"t": "h2", "text": "Chapter 6 Summary"}, {"t": "p", "text": "The deepest cost of missed colour blindness in football is often emotional and personal, not just practical."}, {"t": "p", "text": "Repeated confusion, public mistakes, and misunderstanding can damage a child’s confidence and begin shaping the way they see themselves."}, {"t": "p", "text": "Children may start to feel stupid, inconsistent, embarrassed, hopeless, misunderstood, invisible, or confused without knowing why."}, {"t": "p", "text": "Because football is often tied closely to belonging and identity, repeated hidden struggle can affect much more than performance."}, {"t": "p", "text": "Some children protect themselves by becoming quieter, safer, flatter, angrier, or less expressive. This can be misread as laziness, softness, or attitude when it may actually be self-protection."}, {"t": "p", "text": "Late understanding often brings both relief and grief: relief that the struggle finally has a name, and grief for the years shaped by the wrong explanation."}, {"t": "p", "text": "One of the most important emotional shifts is helping the player separate identity from symptom."}, {"t": "p", "text": "A hesitation is not weakness. Confusion is not stupidity. A hidden visual struggle is not proof that the child does not belong."}, {"t": "p", "text": "Confidence and identity can start to rebuild once the problem is understood honestly and the child no longer has to carry shame alone."}, {"t": "h1", "text": "Chapter 7 - Parents: Spot It Early, Support It Well", "id": "chapter-7-parents-spot-it-early-support-it-well"}, {"t": "p", "text": "Most parents do not miss colour blindness because they do not care."}, {"t": "p", "text": "They miss it because the signs rarely arrive in one clean, obvious moment."}, {"t": "p", "text": "They arrive in fragments."}, {"t": "p", "text": "A strange mistake with socks."}, {"t": "p", "text": "A school tie that looks wrong."}, {"t": "p", "text": "A coat bought in the wrong shade."}, {"t": "p", "text": "A drawing coloured differently from what the child insists they meant."}, {"t": "p", "text": "A football session where everything seems fine until the bibs come out."}, {"t": "p", "text": "A match where the child looks brilliant in one moment and lost in the next."}, {"t": "p", "text": "A complaint about lights."}, {"t": "p", "text": "A hesitation no one else understands."}, {"t": "p", "text": "A look on the way home that says something felt wrong, even if the child cannot explain what it was."}, {"t": "p", "text": "That is how this usually begins for parents."}, {"t": "p", "text": "Not with certainty."}, {"t": "p", "text": "With unease."}, {"t": "p", "text": "Something does not quite add up."}, {"t": "p", "text": "The child can clearly play."}, {"t": "p", "text": "They can clearly think."}, {"t": "p", "text": "They can clearly care."}, {"t": "p", "text": "So why do the same odd mistakes keep appearing?"}, {"t": "p", "text": "Why does one type of drill seem to unsettle them more than another?"}, {"t": "p", "text": "Why do they look confident in some situations and strangely unsure in others?"}, {"t": "p", "text": "Why do they sometimes get things wrong that seem, from the outside, too simple to get wrong?"}, {"t": "p", "text": "These questions matter."}, {"t": "p", "text": "Not because every unusual football moment means colour blindness."}, {"t": "p", "text": "Because colour blindness is one of the things that can hide inside those moments, and parents are often the first people close enough to the child’s wider life to spot the pattern."}, {"t": "p", "text": "That wider view is important."}, {"t": "p", "text": "A coach sees the player in football."}, {"t": "p", "text": "A teacher sees the child in school."}, {"t": "p", "text": "A parent may be the only person who sees both, plus everything else."}, {"t": "p", "text": "The odd clothes mistake."}, {"t": "p", "text": "The school frustration."}, {"t": "p", "text": "The football hesitation."}, {"t": "p", "text": "The way confidence changes in certain situations."}, {"t": "p", "text": "The way the child explains things."}, {"t": "p", "text": "Or avoids explaining them."}, {"t": "p", "text": "That is why parents matter so much in this story."}, {"t": "p", "text": "Not because parents are supposed to diagnose everything themselves."}, {"t": "p", "text": "Because parents are often the first people able to notice that the same invisible thread may be running through different parts of the child’s life."}, {"t": "p", "text": "The first thing parents need is permission to trust that uneasy feeling."}, {"t": "p", "text": "If something feels off repeatedly, it is worth paying attention to."}, {"t": "p", "text": "Not panicking."}, {"t": "p", "text": "Paying attention."}, {"t": "p", "text": "There is a big difference."}, {"t": "p", "text": "Panic makes parents feel as if something urgent and catastrophic must be solved immediately."}, {"t": "p", "text": "Attention says, I do not know exactly what this is yet, but I am going to observe it properly."}, {"t": "p", "text": "That is the right starting point."}, {"t": "p", "text": "Parents do not need perfect certainty on day one."}, {"t": "p", "text": "They need better noticing."}, {"t": "p", "text": "The signs can show up at home."}, {"t": "p", "text": "A child mismatches socks and genuinely thinks they match."}, {"t": "p", "text": "They choose clothes in a shade they swear is different from the one everyone else is seeing."}, {"t": "p", "text": "They call a colour by the wrong name, then look confused when corrected."}, {"t": "p", "text": "They struggle with tasks that rely heavily on colour sorting."}, {"t": "p", "text": "They avoid colouring activities more than expected."}, {"t": "p", "text": "They insist they used the right colour when it clearly looks wrong to everyone else."}, {"t": "p", "text": "None of those signs alone proves colour blindness."}, {"t": "p", "text": "But together, especially when they repeat, they matter."}, {"t": "p", "text": "The signs can show up at school too."}, {"t": "p", "text": "A child may struggle more with colour-coded maps, graphs, folders, or instructions."}, {"t": "p", "text": "They may seem careless with work that depends on colour differences they are not seeing clearly enough."}, {"t": "p", "text": "They may copy from others rather than act with confidence."}, {"t": "p", "text": "They may look slower in tasks where the main issue is not intelligence, but colour-based information."}, {"t": "p", "text": "Again, this does not mean every child with these signs is colour blind."}, {"t": "p", "text": "It means colour blindness should be one of the questions parents keep available, instead of leaving the child to be explained only through attention, effort, or maturity."}, {"t": "p", "text": "Football often makes the signs easier to feel, even when it still does not make them easy to name."}, {"t": "p", "text": "A parent may watch their child play and feel a strange mix of certainty and confusion."}, {"t": "p", "text": "Certainty because they can see the child has ability."}, {"t": "p", "text": "Confusion because that ability keeps getting interrupted by moments that do not make sense."}, {"t": "p", "text": "The child finds space well one minute, then seems to miss something obvious the next."}, {"t": "p", "text": "They look sharp in one coloured setup, then uncomfortable in another."}, {"t": "p", "text": "They seem to come alive in some sessions and shrink in others."}, {"t": "p", "text": "They may hold the ball too long, pass late, or look unsure in drills that rely heavily on bibs, cones, lines, or moving colour cues."}, {"t": "p", "text": "The parent often feels this before they understand it."}, {"t": "p", "text": "They do not yet have the explanation."}, {"t": "p", "text": "They only have the feeling that their child is not being seen clearly by the people around them, and maybe not even by themselves."}, {"t": "p", "text": "That feeling matters."}, {"t": "p", "text": "Because if parents ignore it for too long, the wrong explanation has more time to settle in."}, {"t": "p", "text": "The child starts being described as hesitant."}, {"t": "p", "text": "Inconsistent."}, {"t": "p", "text": "Distracted."}, {"t": "p", "text": "Nervous."}, {"t": "p", "text": "Slow to react."}, {"t": "p", "text": "The parent may start using some of those words too, not because they are harsh, but because they are trying to make sense of what they are watching with the language available to them."}, {"t": "p", "text": "This is why early awareness matters so much."}, {"t": "p", "text": "Not because it solves everything at once."}, {"t": "p", "text": "Because it protects the child from years of carrying the wrong story."}, {"t": "p", "text": "One of the most useful things a parent can do is start noticing when the struggle appears and when it does not."}, {"t": "p", "text": "Not just what went wrong."}, {"t": "p", "text": "When it went wrong."}, {"t": "p", "text": "Which colours were being used?"}, {"t": "p", "text": "What was the light like?"}, {"t": "p", "text": "Was it a match or a training drill?"}, {"t": "p", "text": "Were bibs involved?"}, {"t": "p", "text": "Did the child seem fine before the practice became more colour-dependent?"}, {"t": "p", "text": "Did the struggle grow when multiple coloured cues appeared at once?"}, {"t": "p", "text": "Did they look better when the setup was simpler, clearer, or more distinct?"}, {"t": "p", "text": "These observations can help parents move from vague worry to useful pattern recognition."}, {"t": "p", "text": "That pattern recognition is powerful because it changes the next conversation."}, {"t": "p", "text": "Instead of saying, My child has been off lately, a parent can start saying, I have noticed he struggles much more when the teams are separated by these kinds of bibs, or when the drill relies on these colours, or when the light changes and the pitch gets harder to read."}, {"t": "p", "text": "That is a far more useful starting point."}, {"t": "p", "text": "It gives the problem shape."}, {"t": "p", "text": "And once the problem has shape, it becomes easier to do something about it."}, {"t": "p", "text": "The next step is often testing."}, {"t": "p", "text": "This is where many parents feel unsure."}, {"t": "p", "text": "Not because they do not want to help."}, {"t": "p", "text": "Because they often assume that any important visual issue would already have been found if their child had ever had their eyes checked."}, {"t": "p", "text": "That assumption catches a lot of families out."}, {"t": "p", "text": "A child can seem visually fine in everyday ways and still have colour vision difficulties that were never properly raised or tested for."}, {"t": "p", "text": "That is why a parent may need to ask specifically about colour vision instead of assuming it was covered automatically."}, {"t": "p", "text": "This is not about becoming a medical expert overnight."}, {"t": "p", "text": "It is about asking a more precise question."}, {"t": "p", "text": "Could colour blindness be part of what is happening here?"}, {"t": "p", "text": "Even that question can change a child’s future."}, {"t": "p", "text": "Because once it is asked properly, the parent is no longer trapped in guesswork alone."}, {"t": "p", "text": "They have somewhere to go next."}, {"t": "p", "text": "That matters emotionally as much as practically."}, {"t": "p", "text": "A parent who does not know what is wrong often feels torn between protecting the child and pushing them. They do not want to overreact. They do not want to create a problem that is not there. They do not want to label the child unfairly. But they also do not want to keep watching them struggle and say nothing."}, {"t": "p", "text": "Testing gives that uncertainty somewhere to move."}, {"t": "p", "text": "It turns suspicion into information."}, {"t": "p", "text": "And information is kinder than years of confusion."}, {"t": "p", "text": "How parents talk to the child matters just as much as what parents do next."}, {"t": "p", "text": "A child who is already feeling embarrassed does not need to be told they have a problem in a way that makes them feel broken."}, {"t": "p", "text": "They need calm."}, {"t": "p", "text": "They need dignity."}, {"t": "p", "text": "They need language that explains without shrinking them."}, {"t": "p", "text": "The tone matters."}, {"t": "p", "text": "Not, Something is wrong with you."}, {"t": "p", "text": "More, I think there may be a reason some parts of this have felt harder, and we are going to understand it together."}, {"t": "p", "text": "That is a very different message."}, {"t": "p", "text": "One creates fear."}, {"t": "p", "text": "The other creates relief."}, {"t": "p", "text": "Parents do not need perfect phrasing. They just need to avoid two extremes."}, {"t": "p", "text": "The first extreme is panic."}, {"t": "p", "text": "The second is minimising."}, {"t": "p", "text": "Panic makes the child feel as if their future has suddenly become fragile."}, {"t": "p", "text": "Minimising makes the child feel as if the struggle was never real in the first place."}, {"t": "p", "text": "The better path is steadier."}, {"t": "p", "text": "This may explain some things."}, {"t": "p", "text": "It does not define you."}, {"t": "p", "text": "It does not mean you are weak."}, {"t": "p", "text": "It does not mean you cannot play."}, {"t": "p", "text": "It does mean we can stop guessing and start understanding what helps."}, {"t": "p", "text": "That is the kind of conversation that protects confidence."}, {"t": "p", "text": "Parents also need to understand that support is not only emotional reassurance."}, {"t": "p", "text": "It is practical as well."}, {"t": "p", "text": "A child who may be colour blind needs adults who can start clearing the fog, not just comforting them inside it."}, {"t": "p", "text": "That may mean speaking to the school."}, {"t": "p", "text": "It may mean speaking to the coach."}, {"t": "p", "text": "It may mean checking whether colour is being used as the only signal in situations where that is unnecessary."}, {"t": "p", "text": "It may mean noticing which environments help the child and which repeatedly expose them."}, {"t": "p", "text": "It may mean helping the child get the right eye care more generally if there are other vision issues involved too."}, {"t": "p", "text": "The best parental support is usually a mix of warmth and action."}, {"t": "p", "text": "I believe you."}, {"t": "p", "text": "I am not ashamed of this."}, {"t": "p", "text": "And we are going to do something useful with the information."}, {"t": "p", "text": "That combination is powerful."}, {"t": "p", "text": "Children feel when adults are only feeling sorry for them."}, {"t": "p", "text": "They feel when adults are embarrassed."}, {"t": "p", "text": "They also feel when adults become purposeful."}, {"t": "p", "text": "Purpose helps children settle."}, {"t": "p", "text": "When a parent knows what they are looking for, the child no longer has to carry the whole mystery alone."}, {"t": "p", "text": "Speaking to coaches is one of the most important next steps, and also one of the most delicate."}, {"t": "p", "text": "Parents often worry about this for good reason."}, {"t": "p", "text": "They do not want the child treated differently in a humiliating way."}, {"t": "p", "text": "They do not want the coach to think the family is making excuses."}, {"t": "p", "text": "They do not want the child turned into a special case."}, {"t": "p", "text": "They do not want the whole thing announced in front of teammates."}, {"t": "p", "text": "All of those worries are valid."}, {"t": "p", "text": "That is why the conversation needs to be calm, specific, and practical."}, {"t": "p", "text": "The aim is not to ask for pity."}, {"t": "p", "text": "It is not to ask for lower standards."}, {"t": "p", "text": "It is to give the coach information that may help them understand certain patterns and make sensible adjustments where needed."}, {"t": "p", "text": "That conversation works best when it sounds like clarity, not drama."}, {"t": "p", "text": "I think my child may have some colour vision difficulty, and I have noticed it seems to affect certain bib colours, cones, and fast visual decisions. I wanted to mention it because I think it may explain some of the hesitation you have seen, and I thought it would help if we kept an eye on which setups make things harder."}, {"t": "p", "text": "That kind of conversation is respectful."}, {"t": "p", "text": "It helps the coach."}, {"t": "p", "text": "It protects the child."}, {"t": "p", "text": "And it keeps the focus on the environment, not the child as a problem."}, {"t": "p", "text": "Parents should also be clear about confidentiality."}, {"t": "p", "text": "A child who already feels exposed should not suddenly find themselves discussed in front of the whole group. The goal is to improve understanding and support, not to turn the child into a public lesson."}, {"t": "p", "text": "That does not mean secrecy in a shameful sense."}, {"t": "p", "text": "It means discretion."}, {"t": "p", "text": "Respect."}, {"t": "p", "text": "The child’s dignity matters."}, {"t": "p", "text": "One of the biggest fears many colour-blind players carry is becoming a burden."}, {"t": "p", "text": "Parents can help prevent that fear from growing by showing the child that asking for clarity is not the same as asking for special treatment. Better visual clarity helps the whole session. Better communication helps the whole team. Smarter choices about bibs, cones, and cues do not weaken football. They often improve it."}, {"t": "p", "text": "That is an important message for parents to carry into the house as well."}, {"t": "p", "text": "Your child is not difficult because they need certain things explained or set up more clearly."}, {"t": "p", "text": "They are not demanding because some visual situations cost them more effort."}, {"t": "p", "text": "They are not weak because they have spent time hiding confusion."}, {"t": "p", "text": "They are trying to cope in environments that may not have been designed with them in mind."}, {"t": "p", "text": "That truth can change the emotional atmosphere around the whole issue."}, {"t": "p", "text": "Parents also need to watch what happens after awareness arrives."}, {"t": "p", "text": "Awareness does not automatically remove shame."}, {"t": "p", "text": "Sometimes it removes shame quickly."}, {"t": "p", "text": "Sometimes it first exposes how much shame has already built up."}, {"t": "p", "text": "A child may feel relieved and upset at the same time."}, {"t": "p", "text": "Relieved because things make more sense."}, {"t": "p", "text": "Upset because they start thinking about lost years, missed chances, or all the times they were blamed for something they could not explain."}, {"t": "p", "text": "Parents should expect that mixture."}, {"t": "p", "text": "Not fear it."}, {"t": "p", "text": "It is part of the process of replacing confusion with truth."}, {"t": "p", "text": "The child may need time."}, {"t": "p", "text": "They may need more patience than usual in certain conversations."}, {"t": "p", "text": "They may need permission to feel angry or sad without being rushed back into positivity."}, {"t": "p", "text": "That is still support."}, {"t": "p", "text": "Support is not forcing the child to be grateful instantly because at least now there is an explanation."}, {"t": "p", "text": "Support is staying steady long enough for the explanation to settle properly."}, {"t": "p", "text": "There are also everyday practical things parents can do that are easy to overlook because they seem small."}, {"t": "p", "text": "Notice which kit colours your child feels better in."}, {"t": "p", "text": "Notice whether certain training times are easier than others."}, {"t": "p", "text": "Notice whether bright sunlight, shadows, or evening sessions change how comfortable they look."}, {"t": "p", "text": "Notice what they complain about casually, because casual complaints often reveal more than formal ones."}, {"t": "p", "text": "Listen when they say certain bibs are bad."}, {"t": "p", "text": "Listen when they say the lights make things worse."}, {"t": "p", "text": "Listen when they say everyone else seems to see something faster than they do."}, {"t": "p", "text": "The child may not yet know how to explain the full pattern."}, {"t": "p", "text": "But they often know where the stress lives."}, {"t": "p", "text": "That is valuable information."}, {"t": "p", "text": "Parents should also protect the child from one damaging habit: constant replay."}, {"t": "p", "text": "After a difficult match or session, it is tempting to sit in the car and go through every mistake in the hope"}, {"t": "p", "text": "of helping the child learn. Sometimes that is useful. Sometimes it only deepens shame. If colour blindness may be part of the story, the more useful question is often not, Why did you do that? but, What felt hard there? What did you think you were seeing? Was there something about the colours or the setup that made it harder to trust?"}, {"t": "p", "text": "That question changes the whole tone of the conversation."}, {"t": "p", "text": "It moves from blame to curiosity.Children can breathe inside curiosity. They shrink inside blame."}, {"t": "p", "text": "This chapter is not asking parents to become fearful or overprotective."}, {"t": "p", "text": "It is asking them to become informed, observant, and calm."}, {"t": "p", "text": "A child does not need a parent who treats them as fragile."}, {"t": "p", "text": "They need a parent who can notice the hidden pattern early enough to stop the wrong story taking over."}, {"t": "p", "text": "That parent becomes a bridge."}, {"t": "p", "text": "A bridge between the child’s experience and the adult world."}, {"t": "p", "text": "A bridge between confusion and explanation."}, {"t": "p", "text": "A bridge between visible mistakes and invisible causes."}, {"t": "p", "text": "That bridge matters more than many parents realise."}, {"t": "p", "text": "Because children often borrow their first serious explanation of themselves from the adults closest to them."}, {"t": "p", "text": "If the adults say, You need to stop being careless, the child starts reading themselves through carelessness."}, {"t": "p", "text": "If the adults say, I think there may be a reason this is harder in certain situations, the child starts reading themselves through understanding."}, {"t": "p", "text": "Those are two very different childhoods."}, {"t": "p", "text": "This is why parental support matters so much."}, {"t": "p", "text": "Not because parents can solve every part of the issue."}, {"t": "p", "text": "Because they can change the emotional and practical direction of what comes next."}, {"t": "p", "text": "They can spot patterns earlier."}, {"t": "p", "text": "Ask better questions."}, {"t": "p", "text": "Seek the right testing."}, {"t": "p", "text": "Protect confidence."}, {"t": "p", "text": "Talk to coaches well."}, {"t": "p", "text": "Refuse to let the child’s identity be built only around symptoms nobody has understood properly."}, {"t": "p", "text": "That is not a small role."}, {"t": "p", "text": "It is one of the biggest roles in the whole book."}, {"t": "p", "text": "Because often the next child who gets helped sooner will be helped sooner because a parent trusted their uneasy feeling instead of dismissing it."}, {"t": "p", "text": "A parent noticed."}, {"t": "p", "text": "A parent asked."}, {"t": "p", "text": "A parent listened."}, {"t": "p", "text": "A parent acted."}, {"t": "p", "text": "And because of that, the child no longer had to carry the whole hidden struggle alone."}, {"t": "h2", "text": "Chapter 7 Summary"}, {"t": "p", "text": "Parents often notice colour blindness first not through one dramatic sign, but through repeated fragments that do not quite add up."}, {"t": "p", "text": "The signs can appear at home, at school, and in football, especially when colour-coded tasks, bibs, cones, or fast visual decisions are involved."}, {"t": "p", "text": "The goal is not panic. The goal is better noticing."}, {"t": "p", "text": "Parents should pay attention to when the struggle appears, when it does not, and what changes in the environment when it gets worse."}, {"t": "p", "text": "If colour blindness may be part of the picture, parents may need to ask specifically about colour vision rather than assuming it would already have been picked up automatically."}, {"t": "p", "text": "The way parents talk to the child matters. Calm, steady language protects confidence far better than panic or minimising."}, {"t": "p", "text": "The best support is both emotional and practical: believe the child, seek better understanding, speak to coaches carefully, and help clear the visual fog where possible."}, {"t": "p", "text": "Parents do not need to become experts overnight. They need to become observant, calm, and willing to trust the pattern when the pattern keeps appearing."}, {"t": "p", "text": "Early awareness can stop years of blame, confusion, and unnecessary damage to confidence."}, {"t": "h1", "text": "Chapter 8 - Coaches: Adapt Without Lowering Standards", "id": "chapter-8-coaches-adapt-without-lowering-standards"}, {"t": "p", "text": "Most coaches want the same thing."}, {"t": "p", "text": "Clear sessions."}, {"t": "p", "text": "Sharp decisions."}, {"t": "p", "text": "Good habits."}, {"t": "p", "text": "Higher standards."}, {"t": "p", "text": "Players who improve."}, {"t": "p", "text": "A team that can trust itself under pressure."}, {"t": "p", "text": "That is why this chapter matters."}, {"t": "p", "text": "Because supporting a colour-blind player properly is not about lowering standards. It is about removing unnecessary confusion that gets in the way of those standards being reached."}, {"t": "p", "text": "That difference has to be clear from the beginning."}, {"t": "p", "text": "If a coach hears the words support or adaptation and immediately thinks softer, easier, or less demanding, they are already looking at the problem through the wrong lens."}, {"t": "p", "text": "The real question is not, How do I make football easier for this player?"}, {"t": "p", "text": "The real question is, How do I stop avoidable visual confusion from interfering with football in the first place?"}, {"t": "p", "text": "That is a coaching question."}, {"t": "p", "text": "A serious coaching question."}, {"t": "p", "text": "Because when a drill is visually unclear, the player is not always being tested on football ability alone. They may also be being tested on how well they can survive poor visual design. Those are not the same thing."}, {"t": "p", "text": "A player who struggles with a bad setup is not always struggling with the game itself."}, {"t": "p", "text": "Sometimes they are struggling with noise in the environment."}, {"t": "p", "text": "And good coaching has always been, at least in part, the art of removing the wrong kind of noise."}, {"t": "p", "text": "The strongest coaches are rarely the ones who make sessions look complicated."}, {"t": "p", "text": "They are the ones who make important things clear."}, {"t": "p", "text": "Clear task."}, {"t": "p", "text": "Clear purpose."}, {"t": "p", "text": "Clear language."}, {"t": "p", "text": "Clear cues."}, {"t": "p", "text": "Clear standards."}, {"t": "p", "text": "That is why many of the adaptations that help colour-blind players should not be thought of as special treatment at all. In many cases, they are simply signs of better organisation."}, {"t": "p", "text": "If two teams are too hard to separate quickly, that is not a noble test of toughness. It is poor visual clarity."}, {"t": "p", "text": "If cones disappear into the pitch, that is not realism. It is bad equipment choice."}, {"t": "p", "text": "If a player is being judged harshly for hesitation inside a drill built on low-contrast colour cues, the coach may not be measuring decision-making as cleanly as they think they are."}, {"t": "p", "text": "This is why the idea of quiet adaptation matters so much."}, {"t": "p", "text": "A quiet adaptation is a change that helps the player without turning them into the centre of attention."}, {"t": "p", "text": "It improves clarity without making the session feel like it has stopped for one person."}, {"t": "p", "text": "It raises the quality of the environment without lowering the seriousness of the work."}, {"t": "p", "text": "That is exactly the kind of coaching most players respond best to anyway."}, {"t": "p", "text": "So what does that actually look like?"}, {"t": "p", "text": "It starts with equipment."}, {"t": "p", "text": "A coach cannot control everything in football, but they can control more of the training environment than they sometimes realise. Bib colours. Cone colours. Line colours. Ball choice. How many competing colours are present at once. Whether important information is being given by colour alone or supported with something else."}, {"t": "p", "text": "These choices matter."}, {"t": "p", "text": "Not in a vague awareness sense."}, {"t": "p", "text": "In a football sense."}, {"t": "p", "text": "If the bibs do not separate clearly enough, the whole session slows down in the wrong places."}, {"t": "p", "text": "If the cones are hard to trust quickly, players overrun spaces, hesitate, or look careless."}, {"t": "p", "text": "If the visual organisation of the drill is weak, the coach may end up correcting behaviour that the coach’s own setup helped create."}, {"t": "p", "text": "That is a hard truth for some adults to accept."}, {"t": "p", "text": "But it is an important one."}, {"t": "p", "text": "Because once coaches accept that environment can distort performance, they become much better at reading what they are actually seeing."}, {"t": "p", "text": "A colour-blind player often does not need a softer session."}, {"t": "p", "text": "They need a cleaner one."}, {"t": "p", "text": "That may mean using bib combinations that separate more clearly."}, {"t": "p", "text": "It may mean avoiding certain cones on grass."}, {"t": "p", "text": "It may mean reducing the number of colour-coded instructions in one practice."}, {"t": "p", "text": "It may mean using position, number, shape, or lane language alongside colour instead of relying on colour alone."}, {"t": "p", "text": "These are not dramatic changes."}, {"t": "p", "text": "They are smart ones."}, {"t": "p", "text": "And often they help the whole group."}, {"t": "p", "text": "That is another message good coaches need early."}, {"t": "p", "text": "This is not only about one player."}, {"t": "p", "text": "Better visual clarity usually makes drills cleaner for everybody. Quicker recognition helps all players. Simpler cues reduce wasted hesitation for all players. Better contrast makes the whole task easier to read at speed."}, {"t": "p", "text": "So the coach who adapts well is not being indulgent."}, {"t": "p", "text": "They are often improving the quality of the session."}, {"t": "p", "text": "That is why the best framing is not, How do I help this one difficult case?"}, {"t": "p", "text": "It is, How do I create a training environment where the football challenge is the challenge, rather than the avoidable visual clutter around it?"}, {"t": "p", "text": "That is a much stronger coaching mindset."}, {"t": "p", "text": "It also protects the player from being turned into an outcast."}, {"t": "p", "text": "Because one of the biggest dangers here is public overcorrection."}, {"t": "p", "text": "A coach notices a player may be struggling and then handles it badly."}, {"t": "p", "text": "Why can’t you see that?"}, {"t": "p", "text": "Can you not tell the difference between those bibs?"}, {"t": "p", "text": "Right, everyone stop, he can’t see the colours."}, {"t": "p", "text": "Even if the coach means well, that kind of attention can crush trust instantly."}, {"t": "p", "text": "A player who already fears standing out will often choose silence next time."}, {"t": "p", "text": "They will take the embarrassment of the bad pass over the embarrassment of being singled out."}, {"t": "p", "text": "That is why quiet adaptation matters so much."}, {"t": "p", "text": "The coach does not need to announce everything."}, {"t": "p", "text": "They can simply make better default choices."}, {"t": "p", "text": "Better bibs."}, {"t": "p", "text": "Better cones."}, {"t": "p", "text": "Better cueing."}, {"t": "p", "text": "Better contrast."}, {"t": "p", "text": "Better communication."}, {"t": "p", "text": "That is enough, very often, to remove a huge amount of unnecessary stress without anyone needing to become a public example."}, {"t": "p", "text": "Communication is one of the most powerful tools a coach has."}, {"t": "p", "text": "And it is often one of the cheapest."}, {"t": "p", "text": "Many football sessions rely on lazy colour language without the coach realising how heavily that language shapes the task."}, {"t": "p", "text": "Pass to red."}, {"t": "p", "text": "Defend the yellow gate."}, {"t": "p", "text": "The greens press."}, {"t": "p", "text": "The oranges drop."}, {"t": "p", "text": "Those instructions work for many players."}, {"t": "p", "text": "They are not always the best instructions."}, {"t": "p", "text": "A stronger habit is to give information that survives beyond colour."}, {"t": "p", "text": "Pass to the outside player."}, {"t": "p", "text": "Press the team in bibs."}, {"t": "p", "text": "Play into the left channel."}, {"t": "p", "text": "Defend the near gate."}, {"t": "p", "text": "Find the winger."}, {"t": "p", "text": "Lock onto your side first."}, {"t": "p", "text": "This kind of language is not weaker."}, {"t": "p", "text": "It is more football-specific."}, {"t": "p", "text": "It helps all players connect the action to role, space, and function rather than to colour alone."}, {"t": "p", "text": "That matters because good coaching language should help decision-making transfer into real football. In real football, players are not only processing colours. They are processing roles, positions, space, movement, shape, pressure, and timing. So language that directs attention toward those things is often stronger coaching even before colour blindness enters the conversation."}, {"t": "p", "text": "This is where many coaches can improve immediately."}, {"t": "p", "text": "Not by becoming experts in vision science."}, {"t": "p", "text": "By becoming more precise in what they ask players to see."}, {"t": "p", "text": "Another important coaching skill here is pattern recognition."}, {"t": "p", "text": "A good coach does not only watch what goes wrong."}, {"t": "p", "text": "They watch when it goes wrong."}, {"t": "p", "text": "That distinction matters enormously."}, {"t": "p", "text": "Does the player struggle more when the bib colours change?"}, {"t": "p", "text": "Do mistakes cluster under certain lighting?"}, {"t": "p", "text": "Does hesitation appear more in drills with heavy colour-coding than in freer play?"}, {"t": "p", "text": "Does the same player look clearer when the contrast is stronger?"}, {"t": "p", "text": "Does the uncertainty seem to vanish when the visual scene becomes simpler?"}, {"t": "p", "text": "These are useful observations."}, {"t": "p", "text": "Much more useful than simply deciding early that the player is mentally weak, slow-minded, or unreliable."}, {"t": "p", "text": "This is one of the biggest dangers in coachin
